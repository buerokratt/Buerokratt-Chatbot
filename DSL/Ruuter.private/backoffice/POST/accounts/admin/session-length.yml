declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'SESSION-LENGTH'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: sessionLength
        type: string
        description: "Body field 'sessionLength'"
      - field: chatActiveDuration
        type: string
        description: "Body field 'chatActiveDuration'"
      - field: showIdleWarning
        type: string
        description: "Body field 'showIdleWarning'"
      - field: showIdleWarning
        type: string
        description: "Body field 'autoCloseConversation'"
      - field: showIdleWarning
        type: string
        description: "Body field 'autoCloseText'"

extractRequestData:
  assign:
    sessionLength: ${incoming.body.sessionLength}
    chatActiveDuration: ${incoming.body.chatActiveDuration}
    showIdleWarning: ${incoming.body.showIdleWarning}
    autoCloseConversation: ${incoming.body.autoCloseConversation}
    autoCloseText: ${incoming.body.autoCloseText}

setConfigurationValue:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/set-session-length-conf"
    body:
      created: ${new Date().toISOString()}
      session_length: ${sessionLength}
      chat_active_duration: ${chatActiveDuration}
      show_idle_warning: ${showIdleWarning}
      auto_close_conversation: ${autoCloseConversation}
      auto_close_text: ${autoCloseText}
  result: res

return_result:
  return: ${res.response.body}
