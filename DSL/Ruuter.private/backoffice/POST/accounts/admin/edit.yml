declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'EDIT'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: csaTitle
        type: string
        description: "Body field 'csaTitle'"
      - field: csa_email
        type: string
        description: "Body field 'csa_email'"
      - field: displayName
        type: string
        description: "Body field 'displayName'"
      - field: firstName
        type: string
        description: "Body field 'firstName'"
      - field: lastName
        type: string
        description: "Body field 'lastName'"
      - field: roles
        type: object
        description: "Body field 'roles'"
      - field: userIdCode
        type: string
        description: "Body field 'userIdCode'"
      - field: department
        type: string
        description: "Body field 'department'"
      - field: jiraAccountId
        type: string
        description: "Body field 'jiraAccountId'"
      - field: smaxAccountId
        type: string
        description: "Body field 'smaxAccountId'"
      - field: domains
        type: object
        description: "Body field 'domains'"

extractRequestData:
  assign:
    firstName: ${incoming.body.firstName}
    lastName: ${incoming.body.lastName}
    userIdCode: ${incoming.body.userIdCode}
    displayName: ${incoming.body.displayName}
    csaTitle: ${incoming.body.csaTitle}
    csa_email: ${incoming.body.csa_email}
    roles: ${incoming.body.roles}
    department: ${incoming.body.department}
    jira_account_id: ${incoming.body.jiraAccountId}
    domains: ${incoming.body.domains}
    smax_account_id: ${incoming.body.smaxAccountId}
 
getUser:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-user"
    body:
      userIdCode: ${userIdCode}
  result: res
  next: checkIfUserExists

checkIfUserExists:
  switch:
    - condition: "${res.response.body.length > 0}"
      next: checkJiraAccountId
  next: return_not_exists

checkJiraAccountId:
  switch:
    - condition: ${jira_account_id.length > 0}
      next: getJiraAccountId
  next: updateUser

getJiraAccountId:
  call: http.get
  args:
    url: "[#JIRA_CLOUD_DOMAIN]/rest/api/2/user?username=${jira_account_id}"
    headers:
      Authorization: "Bearer [#JIRA_API_TOKEN]"
      Accept: "application/json"
      Content-Type: "application/json"
  result: jira_user_res

checkJiraUserRes:
  switch:
    - condition: ${jira_user_res.response.body?.name === jira_account_id}
      next: assignJiraAccountId
  next: return_jira_user_not_exists

assignJiraAccountId:
  assign:
    jira_account_id: ${jira_user_res.response.body.name}
  next: updateUser

updateUser:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/update-user"
    body:
      created: ${new Date().toISOString()}
      status: "active"
      firstName: ${firstName}
      lastName: ${lastName}
      userIdCode: ${userIdCode}
      displayName: ${displayName}
      csaTitle: ${csaTitle}
      csaEmail: ${csa_email}
      department: ${department}
      jiraAccountId: ${jira_account_id ?? ""}
      smaxAccountId: ${smax_account_id ?? ""}
  result: add_user_res
  next: updateRoles

updateRoles:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/insert-user-role"
    body:
      userIdCode: ${userIdCode}
      roles: ${roles}
      created: ${new Date().toISOString()}
  result: add_roles_res
  next: checkForDomains

checkForDomains:
  switch:
    - condition: ${!domains}
      next: return_result
  next: updateUserDomains

updateUserDomains:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/insert-user-role-domains"
    body:
      userIdCode: ${userIdCode}
      domains: ${domains}
  result: add_domains_res
  next: return_result

return_result:
  return: "User updated successfully"
  status: 200
  next: end

return_not_exists:
  return: "user_not_found"
  status: 400
  next: end

return_jira_user_not_exists:
  return: "jira_user_not_found"
  status: 400
  next: end
