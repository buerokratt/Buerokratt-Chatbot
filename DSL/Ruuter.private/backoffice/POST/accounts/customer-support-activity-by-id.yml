declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'CUSTOMER-SUPPORT-ACTIVITY-BY-ID'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: customerSupportId
        type: string
        description: "Body field 'customerSupportId'"

extractRequestData:
  assign:
    customerSupportId: "${incoming.body.customerSupportId}"

getCustomerSupportActivity:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/auth_users/get_customer_support_agent_activity_by_id_code"
    query:
      customerSupportId: ${customerSupportId}
  result: res

return_result:
  return: ${res.response.body[0]}
