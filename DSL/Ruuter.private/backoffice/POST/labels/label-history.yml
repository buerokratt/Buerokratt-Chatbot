declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'LABEL-HISTORY'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"
      - field: labels
        type: string
        description: "Body field 'labels'"

extractRequestData:
  assign:
    labels: ${incoming.body.labels}
    chatId: ${incoming.body.chatId}

setChatLabels:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_chat_labels"
    body:
      labels: ${labels}
      chatId: ${chatId}
  result: setLabelsResult

insertDenormalizedLabels:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_labels"
    body:
      chatId: ${chatId}
      labels: ${labels}
      updated: ${setLabelsResult.response.body[0].updated}
  result: insertDenormalizedLabelsResult

return_result:
  return: "success"
  next: end
