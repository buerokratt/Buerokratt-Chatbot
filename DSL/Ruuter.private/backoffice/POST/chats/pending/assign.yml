declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'ASSIGN'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: csaTitle
        type: string
        description: "Body field 'csaTitle'"
      - field: customerSupportDisplayName
        type: string
        description: "Body field 'customerSupportDisplayName'"
      - field: customerSupportId
        type: string
        description: "Body field 'customerSupportId'"
      - field: customerSupportFirstName
        type: string
        description: "Body field 'customerSupportFirstName'"
      - field: customerSupportLastName
        type: string
        description: "Body field 'customerSupportLast Name'"
      - field: id
        type: string
        description: "Body field 'id'"

extractRequestData:
  assign:
    id: "${incoming.body.id}"
    customerSupportId: "${incoming.body.customerSupportId}"
    customerSupportDisplayName: "${incoming.body.customerSupportDisplayName}"
    customerSupportFirstName: "${incoming.body.customerSupportFirstName}"
    customerSupportLastName: "${incoming.body.customerSupportLastName}"
    csaTitle: "${incoming.body.csaTitle}"

getTitleVisibility:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "is_csa_title_visible"
  result: title_res
  next: getActiveChatById

getActiveChatById:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_chat_by_id"
    query:
      id: ${id}
      is_csa_title_visible: ${title_res.response.body[0]?.value}
  result: activeChatRes
  next: checkActiveChatResult

checkActiveChatResult:
  switch:
    - condition: ${activeChatRes.response.body.length > 0}
      next: assignChat
  next: return_chat_ended

assignChat:
  assign:
    activeChat: ${activeChatRes.response.body[0]}
  next: assignPendingChat

assignPendingChat:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_chat"
    body:
      id: ${id}
      customerSupportId: ${customerSupportId}
      customerSupportDisplayName: ${customerSupportDisplayName}
      csaTitle: ${csaTitle}
      endUserId: ${activeChat.endUserId ?? ""}
      endUserFirstName: ${activeChat.endUserFirstName ?? ""}
      endUserLastName: ${activeChat.endUserLastName ?? ""}
      status: "IDLE"
      endUserEmail: ${activeChat.endUserEmail ?? ""}
      endUserPhone: ${activeChat.endUserPhone ?? ""}
      endUserOs: ${activeChat.endUserOs ?? ""}
      endUserUrl: ${activeChat.endUserUrl ?? ""}
      feedbackText: ""
      feedbackRating: ""
      externalId: ${activeChat.externalId ?? ""}
      created: ${activeChat.created ?? "CURRENT_TIMESTAMP"}
      ended: ${activeChat.ended ?? ""}
      forwardedTo: ${activeChat.forwardedTo ?? ""}
      forwardedToName: ${activeChat.forwardedToName ?? ""}
      receivedFrom: ${activeChat.receivedFrom ?? ""}
      receivedFromName: ${activeChat.receivedFromName ?? ""}
  result: assignPendingChatRes
  next: getUuid

getUuid:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/return_uuid"
    headers:
      type: json
  result: uuid_result
  next: assignUuid

assignUuid:
  assign:
    uuid: ${uuid_result.response.body.uuid}
  next: insertMessage

insertMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_message"
    body:
      chatId: ${activeChat.id ?? uuid}
      messageId: ${uuid}
      content: ""
      authorTimestamp: "CURRENT_TIMESTAMP"
      created: "CURRENT_TIMESTAMP"
      authorId: ${customerSupportId}
      authorFirstName: ${customerSupportDisplayName}
      authorRole: "buerokratt"
      authorLastName: ""
      rating: ""
      event: "pending-assigned"
      forwardedByUser: ""
      forwardedFromCsa: ""
      forwardedToCsa: ""
  result: insertMessageResult
  next: updateDenormalizedChat

updateDenormalizedChat:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_and_message"
    body:
      chatId: ${id}
      customerSupportId: ${customerSupportId}
      customerSupportDisplayName: ${customerSupportDisplayName}
      customerSupportFirstName: ${customerSupportFirstName}
      customerSupportLastName: ${customerSupportLastName}
      csaTitle: ${csaTitle}
      endUserId: ${activeChat.endUserId ?? ""}
      endUserFirstName: ${activeChat.endUserFirstName ?? ""}
      endUserLastName: ${activeChat.endUserLastName ?? ""}
      status: "IDLE"
      endUserEmail: ${activeChat.endUserEmail ?? ""}
      endUserPhone: ${activeChat.endUserPhone ?? ""}
      endUserOs: ${activeChat.endUserOs ?? ""}
      endUserUrl: ${activeChat.endUserUrl ?? ""}
      feedbackText: ""
      feedbackRating: ""
      externalId: ${activeChat.externalId ?? ""}
      created: ${activeChat.created ?? assignPendingChatRes.response.body[0].updated}
      ended: ${activeChat.ended ?? ""}
      forwardedTo: ${activeChat.forwardedTo ?? ""}
      forwardedToName: ${activeChat.forwardedToName ?? ""}
      receivedFrom: ${activeChat.receivedFrom ?? ""}
      receivedFromName: ${activeChat.receivedFromName ?? ""}
      updated: ${assignPendingChatRes.response.body[0].updated}
      lastMessageTimestamp: ${insertMessageResult.response.body[0].updated}
      isSupportMessage: false
      isCustomerMessage: false
      authorTimestamp: ${insertMessageResult.response.body[0].updated}
      content: ""
      lastMessageAuthorId: ${customerSupportId}
      lastMessageEvent: "pending-assigned"
  result: updateDenormalizedChatRes
  next: notify_chats

notify_chats:
  template: "[#CHATBOT_PROJECT_LAYER]/chats/notify"
  requestType: templates
  body:
    chatId: ${id}
  result: chats_notify_res
  next: get_title_visibility

get_title_visibility:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "is_csa_title_visible"
  result: title_res
  next: getRedirectedChat

getRedirectedChat:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_chat_active_by_id"
    query:
      id: ${id}
      is_csa_title_visible: ${title_res.response.body[0]?.value}
  result: redirectedChatRes
  next: notify_messages

notify_messages:
  template: "[#CHATBOT_PROJECT_LAYER]/messages/notify"
  requestType: templates
  body:
    chatId: ${activeChat.id ?? uuid}
    type: "message"
    messageId: ${uuid}
  result: messages_notify_res

remove_chat_id_from_queue_notification_node_if_existed:
  call: http.post
  args:
    url: "[#CHATBOT_NOTIFICATIONS]/dequeue"
    body:
      id: ${id}
  result: remove_chat_id_from_queue_notification_node_if_existed_res

return_result:
  return: ${assignPendingChatRes.response.body}
  next: end

return_chat_ended:
  return: "Chat Has Ended"
  status: 400
  next: end
