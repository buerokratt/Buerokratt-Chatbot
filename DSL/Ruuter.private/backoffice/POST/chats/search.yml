declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'SEARCH'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: searchKey
        type: string
        description: "Body field 'searchKey'"

extractRequestData:
  assign:
    searchKey: ${incoming.body.searchKey}

getChatById:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_chat_ids_matching_message_search"
    query:
      searchKey: ${searchKey}
  result: res

return_result:
   return: ${res.response.body}  
