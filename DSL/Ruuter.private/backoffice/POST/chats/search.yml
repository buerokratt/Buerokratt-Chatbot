declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'SEARCH'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: searchKey
        type: string
        description: "Body field 'searchKey'"

extractRequestData:
  assign:
    searchKey: ${incoming.body.searchKey}

getChatIdsFromChatTable:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_chat_ids_matching_search"
    query:
      searchKey: ${searchKey}
  result: res_chats

getChatIdsFromMessageTable:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_message_chat_ids_matching_search"
    query:
      searchKey: ${searchKey}
  result: res_messages

getChatIdsFromCommentsTable:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_chat_history_comments_chat_ids_matching_search"
    query:
      searchKey: ${searchKey}
  result: res_comments

mergeChatIdResultsStepOne:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER]/file-manager/merge"
    body:
      array1: ${res_chats.response.body}
      array2: ${res_messages.response.body}
  result: merged_chats

mergeChatIdResultsStepTwo:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER]/file-manager/merge"
    body:
      array1: ${merged_chats.response.body.array}
      array2: ${res_comments.response.body}
  result: merged_chats

return_result:
  return: ${merged_chats.response.body.array}
