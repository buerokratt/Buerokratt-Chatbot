declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'Edit'"
  method: get
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"
      - field: messageId
        type: string
        description: "Body field 'messageId'"
      - field: content
        type: string
        description: "Body field 'content'"

extractRequestData:
  assign:
    chatId: "${incoming.body.chatId}"
    messageId: "${incoming.body.messageId}"
    content: "${incoming.body.content}"
  next: getMessageById

getMessageById:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_message"
    query:
      id: ${messageId}
  result: message_res
  next: assignMessage

assignMessage:
  assign:
    message: ${message_res.response.body[0]}
  next: insertMessage

insertMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_message"
    body:
      messageId: ${messageId}
      chatId: ${message.chatBaseId}
      authorId: ${message.authorId ?? ""}
      authorTimestamp: ${message.authorTimestamp ?? "CURRENT_TIMESTAMP"}
      created: ${message.created ?? "CURRENT_TIMESTAMP"}
      authorFirstName: ${message.authorFirstName ?? ""}
      authorLastName: ${message.authorLastName ?? ""}
      authorRole: ${message.authorRole ?? ""}
      content: ${content ?? ""}
      event: ${message.event ?? ""}
      forwardedByUser: ${message.forwardedByUser ?? ""}
      forwardedFromCsa: ${message.forwardedFromCsa ?? ""}
      forwardedToCsa: ${message.forwardedToCsa ?? ""}
      rating: ${message.rating ?? ""}
  result: insert_message_res
  next: updateDenormalizedChatMessage

updateDenormalizedChatMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_message_fields_only"
    body:
      chatId: ${message.chatBaseId}
      lastMessageTimestamp: ${insert_message_res.response.body[0].updated}
      isSupportMessage: ${message.authorRole == "backoffice-user"}
      isCustomerMessage: ${message.authorRole == "end-user"}
      authorTimestamp: ${message.authorTimestamp ?? insert_message_res.response.body[0].updated}
      content: ${content ?? ""}
      lastMessageAuthorId: ${message.authorId ?? ""}
      lastMessageEvent: ${message.event ?? ""}
  result: updateDenormalizedChatRes
  next: updateDenormalizedChatMetricsMessageFields

updateDenormalizedChatMetricsMessageFields:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_messages_for_metrics_message_fields_only"
    body:
      chatBaseId: ${message.chatBaseId}
      messageId: ${insert_message_res.response.body[0].id}
      messageBaseId: ${insert_message_res.response.body[0].baseId}
      content: ${content ?? ""}
      lastMessageTimestamp: ${message.created ?? insert_message_res.response.body[0].updated}
      timestamp: ${message.created ?? insert_message_res.response.body[0].updated}
      messageCreated: ${message.created ?? insert_message_res.response.body[0].updated}
      messageUpdated: ${insert_message_res.response.body[0].updated}
      messageEvent: ${message.event ?? ""}
      messageAuthorRole: ${message.authorRole ?? ""}
      messageAuthorId: ${message.authorId ?? ""}
      messageForwardedFromCsa: ${message.forwardedFromCsa ?? ""}
      messageForwardedToCsa: ${message.forwardedToCsa ?? ""}
  result: updateDenormalizedChatMetricsMessageRes
  next: notify_chats

notify_chats:
  template: "[#CHATBOT_PROJECT_LAYER]/chats/notify"
  requestType: templates
  body:
    chatId: ${chatId}
  result: chats_notify_res
  next: notify_messages

notify_messages:
  template: "[#CHATBOT_PROJECT_LAYER]/messages/notify"
  requestType: templates
  body:
    chatId: ${chatId}
    type: "message"
    messageId: ${messageId}
  result: messages_notify_res
  next: return_result

return_result:
  return: "Message Edited Successfully"
  next: end
