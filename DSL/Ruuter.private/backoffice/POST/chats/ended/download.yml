get_xlsx_data:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER]/conversion/chats-to-xlsx"
    body:
      columns: ${columns}
      chatMessages: ${chatMessages.response.body}
      endedChats: ${endedChats.response.body}
  result: xlsxData

return_success:
  wrapper: false
  return: ${xlsxData.response.body}
  next: end
  status: 200
