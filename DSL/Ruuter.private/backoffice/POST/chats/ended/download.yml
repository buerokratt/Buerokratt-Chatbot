declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'DOWNLOAD'"
  method: post
  accepts: json
  returns: data
  namespace: analytics
  allowlist:
    body:
      - field: start
        type: string
        description: "Body field 'start'"
      - field: end
        type: string
        description: "Body field 'end'"
      - field: urls
        type: array
        description: "Body field 'urls'"
      - field: columns
        type: array
        description: "Body field 'columns'"
      - field: sorting
        type: string
        description: "Body field 'sorting'"
      - field: search
        type: string
        description: "Body field 'search'"
      - field: customerSupportIds
        type: object
        description: "Body field 'customerSupportIds'"

extractRequestData:
  assign:
    startDate: ${incoming.body.start}
    endDate: ${incoming.body.end}
    sorting: ${"created desc"}
    search: ${incoming.body.search}
    columns: ${incoming.body.columns}
    urls: ${incoming.body.urls}

getEndedChats:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-cs-all-ended-chats"
    body:
      start: ${startDate}
      end: ${endDate}
      page: ${0}
      page_size: ${1000}
      sorting: ${sorting}
      search: ${search}
      customerSupportIds: ${incoming.body.customerSupportIds?.join(',') ?? ''}
      csaId: ${"chatbot"}
      urls: ${urls}
  result: endedChats

checkEndedChats:
  log: ${endedChats.response.body}

mapChatIds:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/get_chat_ids"
    headers:
      type: json
    body:
      chats: ${endedChats.response.body}
  result: convertedIds

checkMappedId:
  log: ${convertedIds.response.body}

getChatMessages:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-chats-with-messages"
    body:
      chatIds: ${convertedIds.response.body}
  result: chatMessages

checkChatMessages:
  log: ${chatMessages.response.body}

