declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'DOWNLOAD'"
  method: post
  accepts: json
  returns: data
  namespace: analytics
  allowlist:
    body:
      - field: headers
        type: object
        description: "Body field 'headers'"
      - field: language
        type: string
        description: "Body field 'language'"
      - field: startDate
        type: string
        description: "Body field 'startDate'"
      - field: endDate
        type: string
        description: "Body field 'endDate'"
      - field: sorting
        type: string
        description: "Body field 'sorting'"
      - field: search
        type: string
        description: "Body field 'search'"
      - field: customerSupportIds
        type: object
        description: "Body field 'customerSupportIds'"
      - field: urls
        type: array
        description: "Body field 'urls'"
      - field: columnIds
        type: object
        description: "Body field 'columnIds'"

extractRequestData:
  assign:
    headers: ${incoming.body.headers}
    columnIds: ${incoming.body.columnIds}
    language: ${incoming.body.language}
    startDate: "${incoming.body.startDate}"
    endDate: "${incoming.body.endDate}"
    urls: ${incoming.body.urls}

initializeState:
  assign:
    page: 1
    page_size: 100
    totalPages: 1
    allChats: []
    allMessages: []
  next: fetchPage

fetchPage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-cs-all-ended-chats"
    body:
      start: ${startDate}
      end: ${endDate}
      page: ${page}
      page_size: ${page_size}
      sorting: ${incoming.body.sorting}
      search: ${incoming.body.search}
      customerSupportIds: ${incoming.body.customerSupportIds?.join(',') ?? ''}
      csaId: ${"chatbot"}
      urls: ${urls}
  result: pageResult
  next: savePageBody

savePageBody:
  assign:
    pageBody: ${pageResult.response.body}
    totalPages: "${pageResult.response.body.length > 0 ? pageResult.response.body[0].totalPages : 0}"
  next: checkHasResults

checkHasResults:
  switch:
    - condition: ${totalPages == "0"}
      next: return_empty
  next: fetchPageMessages

fetchPageMessages:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-chats-with-messages"
    body:
      chatIds: ${pageBody.map(c => c.id)}
  result: messagesResult
  next: saveMessagesBody

saveMessagesBody:
  assign:
    messagesBody: ${messagesResult.response.body}
  next: appendChats

appendChats:
  switch:
    - condition: ${allChats.length === 0}
      next: appendFirstPage
  next: appendNextPage

appendFirstPage:
  assign:
    allChats: ${[allChats, ...pageBody]}
    allMessages: ${[allMessages, ...messagesBody]}
    page: ${page + 1}
  next: checkMorePages

appendNextPage:
  assign:
    allChats: ${[...allChats, ...pageBody]}
    allMessages: ${[...allMessages, ...messagesBody]}
    page: ${page + 1}
  next: checkMorePages

checkMorePages:
  switch:
    - condition: ${page <= totalPages}
      next: fetchPage
  next: prepareFinalData

prepareFinalData:
  assign:
    finalChats: ${allChats.splice(1, allChats.length - 1)}
    finalMessages: ${allMessages.splice(1, allMessages.length - 1)}
  next: get_xlsx_data

get_xlsx_data:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER]/conversion/chats-to-xlsx"
    body:
      chatMessages: ${finalMessages}
      chatHeaders: ${headers}
      chatColumnIds: ${columnIds}
      chatIds: ${finalChats.map(c => c.id)}
      chatRows: ${finalChats}
      language: ${language}
  result: xlsxData
  next: assign_s3_filepath

assign_s3_filepath:
  assign:
    s3FilePath: ${'history/' + xlsxData.response.body.filePath.split('/').pop()}
  next: copy_xlsx_to_s3

copy_xlsx_to_s3:
  call: http.post
  args:
    url: "[#CHATBOT_S3_FERRY]/v1/files/copy"
    body:
      destinationStorageType: "S3"
      destinationConfigKey: "chats"
      destinationFilePath: ${s3FilePath}
      sourceStorageType: "FS"
      sourceConfigKey: "default"
      sourceFilePath: ${xlsxData.response.body.filePath}
  result: s3FileCopy
  next: get_signed_url

get_signed_url:
  call: http.post
  args:
    url: "[#CHATBOT_S3_FERRY]/v1/files/signed-url/download"
    body:
      type: "S3"
      expiresInSec: 1800
      configKey: "chats"
      filePath: ${s3FilePath}
  result: signedUrlResponse

return_success:
  wrapper: false
  return: ${signedUrlResponse.response.body}
  next: end
  status: 200

return_empty:
  wrapper: false
  return: ''
  next: end
  status: 200
