declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'STATUS'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: authorFirstName
        type: string
        description: "Body field 'authorFirstName'"
      - field: authorId
        type: string
        description: "Body field 'authorId'"
      - field: authorRole
        type: string
        description: "Body field 'authorRole'"
      - field: authorTimestamp
        type: string
        description: "Body field 'authorTimestamp'"
      - field: chatId
        type: string
        description: "Body field 'chatId'"
      - field: event
        type: string
        description: "Body field 'event'"

extractRequestData:
  assign:
    chatId: "${incoming.body.chatId}"
    event: "${incoming.body.event}"
    authorTimestamp: "${incoming.body.authorTimestamp}"
    authorFirstName: "${incoming.body.authorFirstName}"
    authorId: "${incoming.body.authorId}"
    authorRole: "${incoming.body.authorRole}"
  next: deleteMessagePreview

deleteMessagePreview:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/delete_message_preview"
    body:
      chatId: ${chatId}
      content: ""
  result: res
  next: getMessageUuid

getMessageUuid:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/return_uuid"
    headers:
      type: json
  result: message_uuid_result
  next: assignMessageUuid

assignMessageUuid:
  assign:
    messageUuid: ${message_uuid_result.response.body.uuid}
  next: getTitleVisibility

getTitleVisibility:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "is_csa_title_visible"
  result: title_res
  next: getChatById

getChatById:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_chat_by_id"
    query:
      id: ${chatId}
      is_csa_title_visible: ${title_res.response.body[0]?.value}
  result: chatRes
  next: checkChatResult

checkChatResult:
  switch:
    - condition: ${chatRes.response.body.length > 0}
      next: assignChat
  next: return_chat_found

assignChat:
  assign:
    chat: ${chatRes.response.body[0]}
  next: postMessage

postMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_message"
    body:
      chatId: ${chatId}
      messageId: ${messageUuid}
      content: ""
      authorTimestamp: ${authorTimestamp}
      created: "CURRENT_TIMESTAMP"
      authorId: ${authorId}
      authorFirstName: ${authorFirstName}
      authorLastName: ""
      authorRole: "backoffice-user"
      rating: ""
      event: ${event}
      forwardedByUser: ""
      forwardedFromCsa: ""
      forwardedToCsa: ""
  result: message_res
  next: postChat

postChat:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_chat"
    body:
      id: ${chat.id}
      customerSupportId: ${chat.customerSupportId}
      customerSupportDisplayName: ${chat.customerSupportDisplayName}
      csaTitle: ${chat.csaTitle ?? ""}
      endUserId: ${chat.endUserId}
      endUserFirstName: ${chat.endUserFirstName}
      endUserLastName: ${chat.endUserLastName}
      status: "ENDED"
      created: ${chat.created}
      ended: ${chat.ended ?? "CURRENT_TIMESTAMP"}
      feedbackRating: ${chat.feedbackRating ?? ""}
      feedbackText: ${chat.feedbackText ?? ""}
      endUserEmail: ${chat.endUserEmail}
      endUserPhone: ${chat.endUserPhone}
      endUserOs: ${chat.endUserOs}
      endUserUrl: ${chat.endUserUrl}
      externalId: ${chat.externalId}
      forwardedTo: ${chat.forwardedTo}
      forwardedToName: ${chat.forwardedToName}
      receivedFrom: ${chat.receivedFrom}
      receivedFromName: ${chat.receivedFromName ?? ""}
  result: post_chat_res
  next: updateDenormalizedChat

updateDenormalizedChat:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_and_message"
    body:
      chatId: ${chat.id}
      customerSupportId: ${chat.customerSupportId}
      customerSupportDisplayName: ${chat.customerSupportDisplayName}
      customerSupportFirstName: "null"
      customerSupportLastName: "null"
      csaTitle: ${chat.csaTitle ?? ""}
      endUserId: ${chat.endUserId}
      endUserFirstName: ${chat.endUserFirstName}
      endUserLastName: ${chat.endUserLastName}
      status: "ENDED"
      endUserEmail: ${chat.endUserEmail}
      endUserPhone: ${chat.endUserPhone}
      endUserOs: ${chat.endUserOs}
      endUserUrl: ${chat.endUserUrl}
      feedbackRating: ${chat.feedbackRating ?? ""}
      feedbackText: ${chat.feedbackText ?? ""}
      externalId: ${chat.externalId}
      created: ${chat.created}
      ended: ${chat.ended ?? post_chat_res.response.body[0].updated}
      forwardedTo: ${chat.forwardedTo}
      forwardedToName: ${chat.forwardedToName}
      receivedFrom: ${chat.receivedFrom}
      receivedFromName: ${chat.receivedFromName}
      updated: ${post_chat_res.response.body[0].updated}
      lastMessageTimestamp: ${message_res.response.body[0].updated}
      isSupportMessage: true
      isCustomerMessage: false
      authorTimestamp: ${authorTimestamp}
      content: ""
      lastMessageAuthorId: ""
      lastMessageEvent: ${event}
  result: updateDenormalizedChatRes
  next: updateDenormalizedChatMetricsMessageFields

updateDenormalizedChatMetricsMessageFields:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_messages_for_metrics_message_fields_only"
    body:
      chatBaseId: ${chat.id}
      messageId: ${message_res.response.body[0].id}
      messageBaseId: ${message_res.response.body[0].baseId}
      content: ""
      lastMessageTimestamp: ${message_res.response.body[0].updated}
      timestamp: ${message_res.response.body[0].updated}
      messageCreated: ${message_res.response.body[0].updated}
      messageUpdated: ${message_res.response.body[0].updated}
      messageEvent: ${event}
      messageAuthorRole: "backoffice-user"
      messageAuthorId: ${authorId}
      messageForwardedFromCsa: ""
      messageForwardedToCsa: ""
  result: updateDenormalizedChatMetricsMessageRes
  next: updateDenormalizedChatMetricsChatFields

updateDenormalizedChatMetricsChatFields:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_messages_for_metrics_chat_fields_only"
    body:
      chatBaseId: ${chat.id}
      chatId: ${post_chat_res.response.body[0].id}
      status: "ENDED"
      endUserEmail: ${chat.endUserEmail}
      endUserPhone: ${chat.endUserPhone}
      feedbackRating: ${chat.feedbackRating ?? ""}
      feedbackText: ${chat.feedbackText ?? ""}
      customerSupportId: ${chat.customerSupportId}
      customerSupportDisplayName: ${chat.customerSupportDisplayName}
      customerSupportFirstName: "null"
      customerSupportLastName: "null"
      externalId: ${chat.externalId}
      receivedFrom: ${chat.receivedFrom}
      updated: ${post_chat_res.response.body[0].updated}
      ended: ${chat.ended ?? post_chat_res.response.body[0].updated}
  result: updateDenormalizedChatMetricsRes
  next: return_result

return_result:
  return: "Changed Chat Status Successfully"
  next: end

return_chat_found:
  return: "Chat Not Found"
  status: 400
  next: end
