declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'ID-NAME'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"
      - field: endUserFirstName
        type: string
        description: "Body field 'endUserFirstName'"
      - field: endUserId
        type: string
        description: "Body field 'endUserId'"
      - field: endUserLastName
        type: string
        description: "Body field 'endUserLastName'"

assignIncoming:
  assign:
    chatId: "${incoming.body.chatId}"
    id: "${incoming.body.endUserId}"
    firstName: "${incoming.body.endUserFirstName}"
    lastName: "${incoming.body.endUserLastName}"

checkChatId:
  switch:
    - condition: ${!!chatId && chatId !== "" && chatId !== null}
      next: insertIdAndName
  next: returnNoChatId

insertIdAndName:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_chat_with_end_user_id_and_name"
    body:
      chatId: ${chatId}
      endUserId: "${id ? id : ''}"
      endUserFirstName: "${firstName ? firstName : ''}"
      endUserLastName: "${lastName ? lastName : ''}"
  result: insertIdAndNameResult

insertDenormalizedChatIdAndName:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_end_user_id_and_name"
    body:
      chatId: ${chatId}
      endUserId: "${id ? id : ''}"
      endUserFirstName: "${firstName ? firstName : ''}"
      endUserLastName: "${lastName ? lastName : ''}"
      updated: ${insertIdAndNameResult.response.body[0].updated}
  result: insertIdAndNameDenormalizedResult

updateDenormalizedChatMetricsChatFields:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_messages_for_metrics_chat_fields_only"
    body:
      chatBaseId: ${chatId}
      chatId: ${insertIdAndNameResult.response.body[0].id}
      status: "null"
      endUserEmail: "null"
      endUserPhone: "null"
      feedbackText: "null"
      feedbackRating: "null"
      customerSupportDisplayName: "null"
      customerSupportId: "null"
      customerSupportFirstName: "null"
      customerSupportLastName: "null"
      externalId: "null"
      receivedFrom: "null"
      updated: ${insertIdAndNameResult.response.body[0].updated}
      ended: "null"
  result: updateDenormalizedChatMetricsRes

returnSuccess:
  return: Updated ${chatId} with ${id} and ${firstName} ${lastName}.
  next: end

returnNoChatId:
  return: Missing chatId in request body.
  next: end
