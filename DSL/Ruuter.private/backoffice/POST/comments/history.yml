declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'HISTORY'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"
      - field: comment
        type: string
        description: "Body field 'comment'"
      - field: authorDisplayName
        type: string
        description: "Body field 'authorDisplayName'"

extractRequestData:
  assign:
    comment: ${incoming.body.comment}
    chatId: ${incoming.body.chatId}
    authorDisplayName: ${incoming.body.authorDisplayName}

setChatComment:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_chat_history_comment"
    body:
      comment: ${comment}
      chatId: ${chatId}
      authorDisplayName: ${authorDisplayName}
  result: res

updateDenormalizedChat:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_comment_fields_only"
    body:
      comment: ${comment}
      chatId: ${chatId}
      commentAuthor: ${authorDisplayName}
      commentAddedDate: ${res.response.body[0].created}
  result: denormalized_res

return_result:
  return: ${res.response.body}
  next: end
