declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'SEND-HISTORY-TO-EMAIL'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"

extractRequestData:
  assign:
    chatId: ${incoming.body.chatId}

getCustomerSupportIdsByChatId:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_chat_customer_support_ids"
    query:
      chatId: ${chatId}
  result: getCustomerSupportIdsByChatIdResult

mapCustomerSupportIds:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/map_customer_support_ids"
    headers:
      type: json
    body:
      chats: ${getCustomerSupportIdsByChatIdResult.response.body}
  result: customerSupportIdsResult

getUserEmailByCustomerSupportIds:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/auth_users/get_user_email_by_customer_support_id"
    query:
      customerSupportIds: ${customerSupportIdsResult.response.body?.join(',') ?? ''}
  result: getUserEmailByCustomerSupportIdsResult

getChatMessagesByChatIdAndActiveUser:
  template: "[#CHATBOT_PROJECT_LAYER]/chats/get-chat-messages-by-chat-id-and-active-user"
  requestType: templates
  body:
    chatId: ${chatId}
  result: getMessagesByChatIdResult

sendDataToEmail:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER]/js/email/sendMockEmail"
    body:
      to: ${getUserEmailByCustomerSupportIdsResult.response.body[0].csaEmail}
      subject: "Chat history"
      text: ${getMessagesByChatIdResult}
  result: emailResponseData

registerEmailSentEvent:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_message"
    body:
      chatId: ${chatId}
      messageId: ""
      content: ""
      event: "chat_sent_to_csa_email"
      authorTimestamp: "CURRENT_TIMESTAMP"
      created: "CURRENT_TIMESTAMP"
      authorId: ""
      authorFirstName: ""
      authorLastName: ""
      authorRole: "backoffice-user"
      rating: ""
      forwardedByUser: ""
      forwardedFromCsa: ""
      forwardedToCsa: ""
  result: insert_message_res

updateDenormalizedChatMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_message_fields_only"
    body:
      chatId: ${chatId}
      lastMessageTimestamp: ${insert_message_res.response.body[0].updated}
      isSupportMessage: true
      isCustomerMessage: false
      authorTimestamp: ${insert_message_res.response.body[0].updated}
      content: ""
      lastMessageAuthorId: ""
      lastMessageEvent: "chat_sent_to_csa_email"
  result: updateDenormalizedChatRes

updateDenormalizedChatMetricsMessageFields:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_messages_for_metrics_message_fields_only"
    body:
      chatBaseId: ${chatId}
      messageId: ${insert_message_res.response.body[0].id}
      messageBaseId: ${insert_message_res.response.body[0].baseId}
      content: ""
      lastMessageTimestamp: ${insert_message_res.response.body[0].updated}
      timestamp: ${insert_message_res.response.body[0].updated}
      messageCreated: ${insert_message_res.response.body[0].updated}
      messageUpdated: ${insert_message_res.response.body[0].updated}
      messageEvent: "chat_sent_to_csa_email"
      messageAuthorRole: "backoffice-user"
      messageAuthorId: ""
      messageForwardedFromCsa: ""
      messageForwardedToCsa: ""
  result: updateDenormalizedChatMetricsMessageRes

returnSuccess:
  return: "OK"
