declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'EDIT'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: authorFirstName
        type: string
        description: "Body field 'authorFirstName'"
      - field: authorId
        type: string
        description: "Body field 'authorId'"
      - field: authorRole
        type: string
        description: "Body field 'authorRole'"
      - field: authorTimestamp
        type: string
        description: "Body field 'authorTimestamp'"
      - field: chatId
        type: string
        description: "Body field 'chatId'"
      - field: content
        type: string
        description: "Body field 'content'"
      - field: event
        type: string
        description: "Body field 'event'"
      - field: id
        type: string
        description: "Body field 'id'"
      - field: created
        type: string
        description: "Body field 'created'"
    headers:
      - field: cookie
        type: string
        description: "Cookie field"

extractRequestData:
  assign:
    chatId: ${incoming.body.chatId}
    authorId: ${incoming.body.authorId}
    authorFirstName: ${incoming.body.authorFirstName}
    authorRole: ${incoming.body.authorRole}
    authorTimestamp: ${incoming.body.authorTimestamp}
    content: ${incoming.body.content}
    event: ${incoming.body.event}
    id: ${incoming.body.id}
    created: ${incoming.body.created}
    cookie: ${incoming.headers.cookie}
  next: get_user_info

get_user_info:
  call: http.post
  args:
    url: "[#CHATBOT_TIM]/jwt/custom-jwt-userinfo"
    contentType: plaintext
    headers:
      cookie: ${cookie}
    plaintext: "customJwtCookie"
  result: res
  next: check_user_info_response

check_user_info_response:
  switch:
    - condition: ${200 <= res.response.statusCodeValue && res.response.statusCodeValue < 300}
      next: assignIdCode
  next: return_bad_request

assignIdCode:
  assign:
    idCode: ${res.response.body.idCode}
  next: check_is_edited_message

check_is_edited_message:
  switch:
    - condition: ${id != null}
      next: getOriginalMessageById
  next: return_bad_request

getOriginalMessageById:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_message"
    query:
      id: ${id}
  result: original_message

check_message_belongs_to_author:
  switch:
    - condition: ${original_message.response.body[0].authorId == idCode}
      next: getBotConfig
  next: return_bad_request

getBotConfig:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration_bot"
  result: configRes

check_is_editing_Allowed:
  switch:
    - condition: ${configRes.response.body[0].isEditChatVisible == 'true'}
      next: insertEditedMessage
  next: return_message_edit_not_allowed

insertEditedMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_message_edited"
    body:
      chatId: ${chatId}
      messageId: ${id}
      content: ${content ?? ""}
      authorTimestamp: ${authorTimestamp ?? "CURRENT_TIMESTAMP"}
      authorId: ${idCode}
      authorFirstName: ${authorFirstName ?? ""}
      authorRole: ${authorRole ?? "backoffice-user"}
      created: ${created}
      authorLastName: ""
      rating: ""
      event: ${event ?? ""}
      forwardedByUser: ""
      forwardedFromCsa: ""
      forwardedToCsa: ""
  result: insertMessageResult
  next: updateDenormalizedChatMessage

updateDenormalizedChatMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_message_fields_only"
    body:
      chatId: ${chatId}
      lastMessageTimestamp: ${insertMessageResult.response.body[0].updated}
      isSupportMessage: ${authorRole == "backoffice-user"}
      isCustomerMessage: ${authorRole == "end-user"}
      authorTimestamp: ${authorTimestamp ?? insertMessageResult.response.body[0].updated}
      content: ${content ?? ""}
      lastMessageAuthorId: ${idCode}
      lastMessageEvent: ${event ?? ""}
  result: updateDenormalizedChatRes
  next: getMessageById

getMessageById:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_message"
    query:
      id: ${id}
  result: message_res

notify_chats:
  template: "[#CHATBOT_PROJECT_LAYER]/chats/notify"
  requestType: templates
  body:
    chatId: ${chatId}
  result: chats_notify_res
  next: notify_messages

notify_messages:
  template: "[#CHATBOT_PROJECT_LAYER]/messages/notify"
  requestType: templates
  body:
    chatId: ${chatId}
    type: "message"
    messageId: ${id}
  result: messages_notify_res
  next: return_result

return_result:
  return: ${message_res.response.body[0]}
  next: end

return_bad_request:
  status: 400
  return: false
  next: end

return_message_edit_not_allowed:
  status: 409
  return: "Message editing not allowed."
  next: end
