declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'ENDED-CHATS'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: endDate
        type: string
        description: "Body field 'endDate'"
      - field: startDate
        type: string
        description: "Body field 'startDate'"
      - field: page
        type: number
        description: "Body field 'page'"
      - field: page_size
        type: number
        description: "Body field 'page_size'"
      - field: sorting
        type: string
        description: "Body field 'sorting'"
      - field: search
        type: string
        description: "Body field 'search'"

extractRequestData:
  assign:
    startDate: "${incoming.body.startDate}"
    endDate: "${incoming.body.endDate}"

getTitleVisibility:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "is_csa_title_visible"
  result: title_res

getChatNps:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_chat_nps"
  result: chatNps

getEndedChats:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_chats_to_be_removed"
    query:
      auth_date: ${startDate}
      anon_date: ${endDate}
      page: ${incoming.body.page}
      page_size: ${incoming.body.page_size}
      sorting: ${incoming.body.sorting}
      search: ${incoming.body.search}
      is_csa_title_visible: "${title_res.response.body[0].value}"
  result: res

enrich_chats_with_nps:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/enrich_denormalized_chats_with_nps_and_users_data"
    headers:
      type: json
    body:
      chatMessagesRes: ${res.response.body}
      nps: ${chatNps.response.body[0].nps}
  result: res

returnSuccess:
  return: ${res.response.body}
  next: end
