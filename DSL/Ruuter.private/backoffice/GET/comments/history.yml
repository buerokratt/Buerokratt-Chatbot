declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'HISTORY'"
  method: get
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    params:
      - field: chatId
        type: string
        description: "Parameter 'chatId'"

extractRequestData:
  assign:
    chatId: ${incoming.params.chatId}    

getChatHistoryComment:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_chat_history_comments"
    query:
      chatId: ${chatId}
  result: res

returnSuccess:
  return: ${res.response.body}
  next: end
