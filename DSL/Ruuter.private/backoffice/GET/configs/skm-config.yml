declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'SKM-CONFIG'"
  method: get
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    params:
      - field: domain
        type: string
        description: "Body field 'domain'"

assignValues:
  assign:
    domain: ${incoming.params.domain}

checkForDomain:
  switch:
    - condition: ${domain === 'none'}
      next: getSkmConfig
  next: getDomainUUID

getDomainUUID:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-uuid"
    body:
      domainUrl: ${domain + '%'}
  result: domainUuid
  next: validate_domain_res

validate_domain_res:
  switch:
    - condition: ${domainUuid.response.body.length > 0}
      next: getDomainSkmConfig
  next: getSkmConfig

getDomainSkmConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-greeting-message"
    body:
      domainUUID: ${domain}
  result: res
  next: return_result

getSkmConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-skm-config"
  result: res
  next: return_result

return_result:
  return: ${res.response.body[0]}
