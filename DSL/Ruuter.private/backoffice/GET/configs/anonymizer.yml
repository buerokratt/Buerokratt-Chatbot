declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'Anonymizer'"
  method: get
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    params:
      - field: domain
        type: string
        description: "Body field 'domain'"

getEntities:
  call: http.get
  args:
    url: "[#CHATBOT_ANONYMIZER]/supportedentities"
  result: entities_res

assignValues:
  assign:
    domain: ${incoming.params.domain}  
    entities: ${entities_res.response.body.entities}

checkForDomain:
  switch:
    - condition: ${domain === 'none'}
      next: getAnonymizerConfig
  next: getDomainAnonymizerConfig

getDomainAnonymizerConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-anonymizer-config"
    body:
      domainUUID: ${domain}
  result: res
  next: return_result

getAnonymizerConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-anonymizer-config"
  result: res

mapAllConfigs:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/return_anonymizer_config"
    headers:
      type: json
    body:
      configs: ${res.response.body[0]}
      entities: ${entities}
  result: mappedConfigs
  next: return_result

return_result:
  return: ${mappedConfigs.response.body}

