declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'NEW'"
  method: get
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    params:
      - field: chatId
        type: string
        description: "Parameter 'chatId'"
      - field: lastRead
        type: string
        description: "Parameter 'lastRead'"

extractRequestData:
  assign:
    chatId: ${incoming.params.chatId}
    lastRead: ${incoming.params.lastRead}

get_users_having_active_status:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/auth_users/list_users_having_status_active"
  result: activeUsers

get_message_previews:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_message_previews_by_chat_base_id"
    query:
      chatId: ${chatId}
  result: messagePreviewsRes

getNewMessages:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_messages_updated_after_time"
    query:
      chatId: ${chatId}
      timeRangeBegin: ${lastRead}
  result: res

enrich_messages_with_author_data:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/enrich_messages_with_author_data_and_previews"
    headers:
      type: json
    body:
      messages: ${res.response.body}
      activeUsers: ${activeUsers.response.body}
      messagePreviews: ${messagePreviewsRes.response.body}
  result: res

returnSuccess:
  return: ${res.response.body}
