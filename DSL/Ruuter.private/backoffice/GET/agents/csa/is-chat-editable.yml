declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'IS-CHAT-EDITABLE'"
  method: get
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    params:
      - field: domain
        type: string
        description: "Body field 'domain'"

assignValues:
  assign:
    domain: ${incoming.params.domain}

checkForDomain:
  switch:
    - condition: ${domain === 'none'}
      next: getBotConfig
  next: getDomainBotConfig

getDomainBotConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-bot-config"
    body:
      domainUUID: ${domain}
  result: res
  next: return_result

getBotConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-bot-config"
  result: res

return_result:
  return: ${res.response.body[0].isEditChatVisible}
