declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'MESSAGE'"
  method: get
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    params:
      - field: domain
        type: string
        description: "Body field 'domain'"

assignValues:
  assign:
    domain: ${incoming.params.domain}

checkForDomain:
  switch:
    - condition: ${domain === 'none'}
      next: getGreetingMessage
  next: getDomainGreetingMessage

getDomainGreetingMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-greeting-message"
    body:
      domainUUID: ${domain}
  result: res
  next: return_result

getGreetingMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-greeting-message"
  result: res

return_result:
  return: ${res.response.body[0]}
