declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'ADMINS'"
  method: get
  accepts: json
  returns: json
  namespace: backoffice

getTitleVisibility:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "is_csa_title_visible"
  result: title_res
  next: getAdmins

getAdmins:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/auth_users/list_users_with_roles"
    query:
      is_csa_title_visible: ${title_res.response.body[0]?.value}
  result: res

return_result:
  return: ${res.response.body}
