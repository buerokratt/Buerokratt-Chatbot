declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'llm'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: uuid
        type: string
        description: "Body field 'uuid'"
      - field: message
        type: json
        description: "Body field 'message'"
      - field: holidayNames
        type: string
        description: "Body field 'holidayNames'"
      - field: holidays
        type: string
        description: "Body field 'holidays'"
      - field: context
        type: json
        description: "Body field 'context'"
      - field: domain
        type: string
        description: "Body field 'domain'"  

extractRequestData:
  assign:
    uuid: ${incoming.body.uuid}
    message: ${incoming.body.message}
    sender: ${message.chatId}
    holidayNames: ${incoming.body.holidayNames}
    holidays: ${incoming.body.holidays}
    context: ${incoming.body.context ?? []}
    domain: ${incoming.body.domain}
    event: ""
    isOrgAvailable: false

get_bot_name:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-configuration"
    body:
      key: "bot_institution_id"
    error: return_bad_request
  result: bot_name_res

check_if_bot_name_exists:
  switch:
    - condition: ${bot_name_res.response.body[0]?.value != null}
      next: assign_value
  next: return_bot_name_does_not_exist

assign_value:
  assign:
    correct_value:
      - recipient_id: ${sender}
        text: ${message.content.replace(/\n/g,"\\n").replace(" \. ", ". ")}
        context: ${context}
    authorId: ${bot_name_res.response.body[0]?.value ?? 'chatbot'}    
  next: check_value

check_value:
  switch:
    - condition: ${correct_value === 'ERROR'}
      next: return_value
    - condition: ${correct_value.map((item) => item.text)[0] === '$backoffice' || correct_value.map((item) => item.text)[0].startsWith('$backoffice') || correct_value.map((item) => item.text)[0].includes('$backoffice')}
      next: check_base_config_domain
    - condition: ${correct_value.map((item) => item.text)[0].startsWith('$validate_')}
      next: assign_validation_event
    - condition: ${correct_value.map((item) => item.text)[0] === '$general_knowledge' || correct_value.map((item) => item.text)[0].startsWith('$general_knowledge')}
      next: trigger_bgk_bot  
  next: format_messages

trigger_bgk_bot:
  call: http.post
  args:
    url: "[#CHATBOT_RUUTER_PUBLIC_INTERNAL]/internal/bgk-external-bot"
    body:
      sender: ${sender}
      message: ${message.content ?? ''}
      domain: ${domain}
  result: bgk_bot_response
  error: return_bad_request
  next: end

check_base_config_domain:
  switch:
    - condition: ${domain === 'none'}
      next: get_organization_base_config
  next: getDomainUUID

getDomainUUID:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-uuid"
    body:
      domainUrl: ${domain + '%'}
  result: domainUuid
  next: validate_domain_res

validate_domain_res:
  switch:
    - condition: ${domainUuid.response.body.length > 0}
      next: get_domain_organization_base_config
  next: get_organization_base_config

get_domain_organization_base_config:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-organization-base-config"
    body:
      domainUUID: ${domainUuid.response.body[0].domainId}
  result: org_base_config_res
  next: assign_organization_base_config

get_organization_base_config:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-organization-base-config"
  result: org_base_config_res
  next: assign_organization_base_config

assign_organization_base_config:
  assign:
    base_config: ${org_base_config_res.response.body[0]}
  next: check_if_organization_use_csa

check_if_organization_use_csa:
  switch:
    - condition: ${base_config.isOrganizationUseCsa === 'true'}
      next: check_if_organization_is_available_all_time
  next: assign_organization_does_not_use_csa

check_if_organization_is_available_all_time:
  switch:
    - condition: ${base_config.isAvailableAllTime === 'true'}
      next: get_all_available_csas
  next: check_domain_organization_working_hours

check_domain_organization_working_hours:
  switch:
    - condition: ${domain === 'none'}
      next: get_organization_working_details
  next: validate_domain

validate_domain:
  switch:
    - condition: ${domainUuid.response.body.length > 0}
      next: get_domain_organization_working_details
  next: get_organization_working_details

get_domain_organization_working_details:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-is-domain-organization-available"
    body:
      holidays: ${holidays}
      holiday_names: ${holidayNames}
      current_timestamp: ${new Date().toISOString()}
      domainUUID: ${domainUuid.response.body[0].domainId}
  result: org_res
  next: assign_organization_details

get_organization_working_details:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-is-organization-available"
    body:
      holidays: ${holidays}
      holiday_names: ${holidayNames}
      current_timestamp: ${new Date().toISOString()}
  result: org_res
  next: assign_organization_details

assign_organization_details:
  assign:
    org_details: ${org_res.response.body[0]}
  next: check_if_organization_is_available

check_if_organization_is_available:
  switch:
    - condition: ${org_details.isWithinWorkingTime === true && org_details.isWithinWorkingDays === true && org_details.isAllowedToWorkAtHolidays === true}
      next: get_all_available_csas
    - condition: ${org_details.isWithinWorkingTime === true && org_details.isWithinWorkingDays === true && org_details.isAllowedToWorkAtHolidays === false && org_details.isHoliday == true}
      next: assign_outside_working_hours
    - condition: ${org_details.isWithinWorkingTime === true && org_details.isWithinWorkingDays === true && org_details.isAllowedToWorkAtHolidays === false && org_details.isHoliday == false}
      next: get_all_available_csas
  next: assign_outside_working_hours

get_all_available_csas:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-all-available-customer-support-agents"
  result: csas_res
  next: assign_available_csas

assign_available_csas:
  assign:
    available_csas: ${csas_res.response.body.length}
  next: check_if_csas_are_available

check_if_csas_are_available:
  switch:
    - condition: ${available_csas == 0}
      next: assign_no_csas_available
  next: assign_organization_available

assign_no_csas_available:
  assign:
    correct_value:
      - recipient_id: ${sender}
        text: ${base_config.noCsaMessage}
        context: ${context}
    event: "${base_config.askForContacts === 'true' ? 'unavailable_csas_ask_contacts' : 'unavailable_csas'}"
  next: format_messages

assign_outside_working_hours:
  assign:
    correct_value:
      - recipient_id: ${sender}
        text: ${base_config.outsideWorkingHoursMessage}
        context: ${context}
    event: "${base_config.outsideWorkingHoursAskForContacts === 'true' ? 'unavailable_organization_ask_contacts' : 'unavailable_organization'}"
  next: format_messages  

assign_organization_available:
  assign:
    isOrgAvailable: true
  next: get_organization_bot_answer_config
  
return_value:
  return: ${correct_value}
  next: end

assign_validation_event:
  assign:
    correct_value:
      - recipient_id: ${sender}
        text: ${correct_value.map((item) => item.text)[0].replace('$validate_', '')}
        context: ${context}
    event: "waiting_validation"
  next: change_chat_status 

change_chat_status:
  call: http.post
  args:
    url: "[#CHATBOT_RUUTER_PUBLIC]/chats/change-status"
    body:
      chatId: ${sender}
      status: "VALIDATING"
      holidays: ${holidays}
      holidayNames: ${holidayNames}
  result: change_chat_status_res
  next: check_chat_status_result

check_chat_status_result:
  switch:
    - condition: ${change_chat_status_res.response.body.response === "Status Changed Successfully"}
      next: format_messages
  next: assign_unavailable_message

assign_unavailable_message:
  assign:
    correct_value:
      - recipient_id: ${sender}
        text: "Edasine lahendamine toimub vastavalt pöördumiste protsessile väljaspool AI-assistendi lahendust."
        context: ${context}
    event: ""
  next: format_messages

get_organization_bot_answer_config:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-organization-bot-answer-config"
  result: bot_answer_config_res
  next: assign_organization_bot_answer_config

assign_organization_bot_answer_config:
  assign:
    bot_answer_config: ${bot_answer_config_res.response.body[0]}
  next: assign_back_office_event

assign_back_office_event:
  assign:
    correct_value:
      - recipient_id: ${sender}
        text: ${base_config.redirectIfBotCannotAnswerMessage}
        context: ${context}
    event: "${isOrgAvailable === true ? 'ask_to_forward_to_csa' : ''}"
  next: format_messages

assign_organization_does_not_use_csa:
  assign:
    correct_value:
      - recipient_id: ${sender}
        text: ${base_config.botCannotAnswerMessage}
        context: ${context}
    event: "unavailable_organization"
  next: format_messages

format_messages:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/llm_responses_to_messages"
    headers:
      type: json
    body:
      data:
        {
          "botMessages": "${correct_value}",
          "chatId": "${sender}",
          "authorId": "${authorId}",
          "authorFirstName": "",
          "authorLastName": "",
          "event": "${event ?? ''}",
          "authorTimestamp": "${new Date().toISOString()}",
          "created": "${new Date().toISOString()}",
        }
  result: formated_messages_res

assign_formated_messages:
  assign:
    format_messages: ${formated_messages_res.response.body} 

add_bot_message_to_db:
  switch:
    - condition: ${format_messages.length > 0}
      next: insertMessage
  next: return_no_messages

insertMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/insert-message"
    body:
      chatId: ${sender}
      messageId: ${uuid}
      content: ${format_messages[0].content}
      authorTimestamp: ${new Date().toISOString()}
      authorId: ${authorId}
      authorFirstName: ""
      authorRole: "buerokratt"
      created: ${new Date().toISOString()}
      authorLastName: ""
      rating: ""
      event: ${event ?? ""}
      forwardedByUser: ""
      forwardedFromCsa: ""
      forwardedToCsa: ""
  result: insertMessageResult

notify_chats:
  template: "[#CHATBOT_PROJECT_LAYER]/chats/notify"
  requestType: templates
  body:
    chatId: ${sender}
  result: chats_notify_res

notify_messages:
  template: "[#CHATBOT_PROJECT_LAYER]/messages/notify"
  requestType: templates
  body:
    chatId: ${sender}
    type: "message"
    messageId: ${uuid}
  result: messages_notify_res

return_ok:
  status: 200
  return: "Message sent successfully"
  next: end

return_no_messages:
  status: 200
  return: "No messages to send"
  next: end

return_bot_name_does_not_exist:
  status: 200
  return: "Bot name does not exist"
  next: end

return_bad_request:
  status: 400
  return: "Bad Request"
  next: end
