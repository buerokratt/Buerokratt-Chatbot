declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'GREETING'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"
      - field: clientTimestamp
        type: string
        description: "Body field 'clientTimestamp'"
      - field: domain
        type: string
        description: "Body field 'domain'"  

extractRequestData:
  assign:
    chatId: "${incoming.body.chatId}"
    clientTimestamp: "${incoming.body.clientTimestamp}"
    domain: "${incoming.body.domain}"

checkForDomain:
  switch:
    - condition: ${domain === 'none'}
      next: getGreetingMessage
  next: getDomainUUID

getDomainUUID:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-uuid"
    body:
      domainUrl: ${domain + '%'}
  result: domainUuid
  next: validate_domain_res

validate_domain_res:
  switch:
    - condition: ${domainUuid.response.body.length > 0}
      next: getDomainGreetingMessage
  next: getGreetingMessage

getDomainGreetingMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-greeting-message"
    body:
      domainUUID: ${domainUuid.response.body[0].domainId}
  result: greeting_result
  next: getUuid

getGreetingMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-greeting-message"
  result: greeting_result

getUuid:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/return_uuid"
    headers:
      type: json
  result: uuid_result
  next: assignUuidAndGreetingMessage

assignUuidAndGreetingMessage:
  assign:
    uuid: ${uuid_result.response.body.uuid}
    greetingMessage: ${greeting_result.response.body[0].est}
  next: insertGreetingMessage  

insertGreetingMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/insert-message"
    body:
      chatId: ${chatId}
      messageId: ${uuid}
      content: ${greetingMessage}
      authorTimestamp: ${new Date().toISOString()}
      authorRole: "buerokratt"
      created: ${new Date().toISOString()}
      event: "greeting"
      authorId: ""
      authorFirstName: ""
      authorLastName: ""
      rating: ""
      forwardedByUser: ""
      forwardedFromCsa: ""
      forwardedToCsa: ""
  result: insertMessageResult
  next: returnSuccess  

returnSuccess:
  return: "Greeting Message Sent Successfully"
  next: end
