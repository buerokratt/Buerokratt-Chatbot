declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'ALL'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"
    header:
      - field: cookie
        type: string
        description: "Cookie field"

get_chat_info:
  call: http.post
  args:
   url: "[#CHATBOT_TIM]/jwt/custom-jwt-userinfo"
   contentType: plaintext
   headers:
    cookie: ${incoming.headers.cookie}
   plaintext:
      "chatJwt"
  result: infoRes

check_info_response:
  switch:
    - condition: ${infoRes.response.body}
      next: assignInfoChatId
  next: assignChatId

assignInfoChatId:
  assign:
    chatId: ${infoRes.response.body.chatId}
  next: getChatMessages

assignChatId:
  assign:
    chatId: ${incoming.body.chatId}
  next: getChatMessages

getChatMessages:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-chat-messages"
    body:
      chatId: ${chatId}
  result: res
  next: returnSuccess

returnSuccess:
  return: ${res.response.body}
  next: end

return_bad_request:
  status: 400
  return: false
  next: end  
