declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'GET'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"
    header:
      - field: cookie
        type: string
        description: "Cookie field"

get_chat_info:
  call: http.post
  args:
   url: "[#CHATBOT_TIM]/jwt/custom-jwt-userinfo"
   contentType: plaintext
   headers:
    cookie: ${incoming.headers.cookie}
   plaintext:
      "chatJwt"
  result: infoRes

check_info_response:
  switch:
    - condition: ${infoRes.response.body}
      next: assignInfoChatId
  next: assignChatId

assignInfoChatId:
  assign:
    chatId: ${infoRes.response.body.chatId}
  next: getChat

assignChatId:
  assign:
    chatId: ${incoming.body.chatId}
  next: getChat

getChat:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-chat-by-id"
    body:
      id: ${chatId}
  result: res
  next: checkIfChatIsEnded

checkIfChatIsEnded:
  switch:
    - condition: ${res.response.body[0].status == "ENDED"}
      next: unassign_cookie
  next: return_result

unassign_cookie:
  assign:
    userCookie:
      userJwt: null
      Domain: "[#DOMAIN]"
      Secure: true
      HttpOnly: true
      SameSite: "[#COOKIE_SAME_SITE]"
      Max-Age: 0
  next: remove_cookie

remove_cookie:
  headers: 
    Set-Cookie: ${userCookie}
  return: ${res.response.body[0]}
  next: end

return_result:
  return: ${res.response.body[0]}
  next: end

return_bad_request:
  status: 400
  return: false
  next: end  
