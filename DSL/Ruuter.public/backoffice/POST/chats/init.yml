declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'INIT'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    headers:
      - field: cookie
        type: string
        description: "Cookie field"
    body:
      - field: holidayNames
        type: string
        description: "Body field 'holidayNames'"
      - field: holidays
        type: string
        description: "Body field 'holidays'"
      - field: message
        type: json
        description: "Body field 'message'"
      - field: endUserTechnicalData
        type: json
        description: "Body field 'endUserTechnicalData'"
      - field: domain
        type: string
        description: "Body field 'domain'"

extractRequestData:
  assign:
    authorRole: ${incoming.body.message.authorRole}
    authorTimestamp: ${incoming.body.message.authorTimestamp}
    content: ${incoming.body.message.content ?? ""}
    endUserId: ""
    endUserEmail: ""
    endUserFirstName: ""
    endUserLastName: ""
    endUserPhone: ""
    endUserOs: ${incoming.body.endUserTechnicalData.endUserOs}
    endUserUrl: ${incoming.body.endUserTechnicalData.endUserUrl}
    forwardedByUser: ""
    forwardedFromCsa: ""
    forwardedToCsa: ""
    holidays: ${incoming.body.holidays}
    holidayNames: ${incoming.body.holidayNames}
    domain: ${incoming.body.domain}

check_if_anonymizer_is_active:
  switch:
    - condition: ${[#ANONYMIZER_ENABLED] === true}
      next: checkForPassedDomain
  next: checkIncomingCookie

checkForPassedDomain:
  switch:
    - condition: ${domain === 'none'}
      next: getAnonymizerConfig
  next: getDomainUUID

getDomainUUID:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-uuid"
    body:
      domainUrl: ${domain + '%'}
  result: domainUuid
  next: validate_domain_res

validate_domain_res:
  switch:
    - condition: ${domainUuid.response.body.length > 0}
      next: getDomainAnonymizerConfig
  next: getAnonymizerConfig

getAnonymizerConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-anonymizer-config"
  result: anonymizer_configs_res
  next: assignAnonymizerConfigs

getDomainAnonymizerConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-anonymizer-config"
    body:
      domainUUID: ${domainUuid.response.body[0].domainId}
  result: anonymizer_configs_res
  next: assignAnonymizerConfigs

assignAnonymizerConfigs:
  assign:
    anonymizer_configs: ${anonymizer_configs_res.response.body[0]}
  next: check_if_content_needs_anonymization

check_if_content_needs_anonymization:
  switch:
    - condition: ${anonymizer_configs.recordConversationsAnonymously === 'true'}
      next: prepareAnonymizerConfig
  next: checkIncomingCookie

prepareAnonymizerConfig:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/prepare_anonymizer_config"
    headers:
      type: json
    body:
      texts: ${[content]}
      approach: ${anonymizer_configs.anonymizerSelectedApproach}
      entities: ${anonymizer_configs.anonymizerSelectedEntities.split(',')}
      allowlist: ${anonymizer_configs.anonymizerAllowlist.split(',')}
      denylist: ${anonymizer_configs.anonymizerDenylist.split(',')}
      hash_type: "[#ANONYMIZER_HASH_TYPE]"
  result: preparedAnonymizerConfigs
  next: assignPreparedAnonymizerConfigs

assignPreparedAnonymizerConfigs:
  assign:
    preparedAnonymizerConfigs: ${preparedAnonymizerConfigs.response.body}
  next: anonymizeText

anonymizeText:
  call: http.post
  args:
    url: "[#CHATBOT_ANONYMIZER]/anonymize"
    body:
      texts: ${preparedAnonymizerConfigs.texts}
      anonymizers: ${preparedAnonymizerConfigs.anonymizers}
      entities: ${preparedAnonymizerConfigs.entities}
      allowlist: ${preparedAnonymizerConfigs.allowlist}
      denylist: ${preparedAnonymizerConfigs.denylist}
  result: anonymize_res
  next: assign_anonymized_content

assign_anonymized_content:
  assign:
    content: ${anonymize_res.response.body.results[0].text ?? ''}
  next: checkIncomingCookie

checkIncomingCookie:
  switch:
    - condition: ${incoming.headers.cookie == null}
      next: getChatUuid
  next: getTaraUserInfo

getTaraUserInfo:
  call: http.post
  args:
   url: "[#CHATBOT_TIM]/jwt/custom-jwt-userinfo"
   contentType: plaintext
   headers:
    cookie: ${incoming.headers.cookie}
   plaintext: 
      "customSmaxJwtCookie"
  result: tara_info

checkTaraInfo:
  switch:
    - condition: ${tara_info.response.body !== null}
      next: assignEndUserFields
  next: getChatUuid

assignEndUserFields:
  assign:
    endUserId: ${tara_info.response.body.personalCode}
    endUserEmail: ${tara_info.response.body.login}
    endUserFirstName: ${tara_info.response.body.firstName}
    endUserLastName: ${tara_info.response.body.lastName}

getChatUuid:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/return_uuid"
    headers:
      type: json
  result: chat_uuid_result
  next: assignChatUuid

assignChatUuid:
  assign:
    chatUuid: ${chat_uuid_result.response.body.uuid}
  next: getMessageUuid

getMessageUuid:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/return_uuid"
    headers:
      type: json
  result: message_uuid_result
  next: assignMessageUuid

assignMessageUuid:
  assign:
    messageUuid: ${message_uuid_result.response.body.uuid}
  next: get_session_length

get_session_length:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-configuration"
    body:
      key: "session_length"
  result: session_result
  next: generate_cookie

generate_cookie:
  call: http.post
  args:
    url: "[#CHATBOT_TIM]/jwt/custom-jwt-generate"
    body:
      JWTName: "chatJwt"
      expirationInMinutes: ${session_result.response.body[0]?.value ?? '120'}
      content: { "chatId": "${chatUuid}", "forwardTo": "" }
  result: cookie_result
  next: assign_cookie

assign_cookie:
  assign:
    setCookie:
      chatJwt: ${cookie_result.response.body.token}
      Domain: "[#DOMAIN]"
      Secure: true
      HttpOnly: true
      SameSite: "[#COOKIE_SAME_SITE]"
  next: postGreetingMessage

postGreetingMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RUUTER_PUBLIC]/chats/messages/greeting"
    body:
      chatId: ${chatUuid}
      authorTimestamp: ${authorTimestamp}
      domain: ${domain}
  result: greeting_result
  next: postClientMessage

postClientMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/insert-message"
    body:
      chatId: ${chatUuid}
      messageId: ${messageUuid}
      content: ${content}
      event: ""
      authorTimestamp: ${authorTimestamp}
      authorId: ${endUserId}
      authorFirstName: ${endUserFirstName}
      authorRole: ${authorRole}
      created: ${new Date().toISOString()}
      authorLastName: ${endUserLastName}
      rating: ""
      forwardedByUser: ${forwardedByUser}
      forwardedFromCsa: ${forwardedFromCsa}
      forwardedToCsa: ${forwardedToCsa}
  result: insertMessageResult
  next: insertChat

insertChat:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/init-chat"
    body:
      id: ${chatUuid}
      endUserId: ${endUserId}
      endUserFirstName: ${endUserFirstName}
      endUserLastName: ${endUserLastName}
      status: "OPEN"
      lastMessage: ${content}
      created: ${new Date().toISOString()}
      ended: ""
      feedbackRating: ""
      feedbackText: ""
      endUserEmail: ${endUserEmail}
      endUserPhone: ${endUserPhone}
      endUserOs: ${endUserOs}
      endUserUrl: ${endUserUrl}
      externalId: ""
      forwardedTo: ""
      forwardedToName: ""
      receivedFrom: ""
      receivedFromName: ""
  result: insertMessageResult
  next: postMessageToBot

postMessageToBot:
  call: http.post
  args:
    url: "[#CHATBOT_RUUTER_PUBLIC]/internal/message-to-bot"
    body:
      chatId: ${chatUuid}
      content: ${content}
      holidays: ${holidays}
      holidayNames: ${holidayNames}
      domain: ${domain}
  result: message_to_bot_result
  next: check_for_post_message_to_bot_result

check_for_post_message_to_bot_result:
  switch:
    - condition: ${message_to_bot_result.response.body.response === 'Bot error'}
      next: return_bot_error
  next: getChat

getChat:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-chat-by-id"
    body:
      id: ${chatUuid}
  result: chat_result
  next: notify_chats

notify_chats:
  template: "[#CHATBOT_PROJECT_LAYER]/chats/notify"
  requestType: templates
  body:
    chatId: ${chatUuid}
  result: chats_notify_res
  next: notify_messages

notify_messages:
  template: "[#CHATBOT_PROJECT_LAYER]/messages/notify"
  requestType: templates
  body:
    chatId: ${chatUuid}
    type: "message"
    messageId: ${messageUuid}
  result: messages_notify_res
  next: return_result

return_result:
  headers:
    Set-Cookie: ${setCookie}
  return: ${chat_result.response.body[0]}
  next: end

return_bot_error:
  status: 420
  return: "Bot error"
  next: end
