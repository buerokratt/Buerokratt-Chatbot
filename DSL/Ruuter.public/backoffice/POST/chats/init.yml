declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'INIT'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: holidayNames
        type: string
        description: "Body field 'holidayNames'"
      - field: holidays
        type: string
        description: "Body field 'holidays'"
      - field: message
        type: json
        description: "Body field 'message'"
      - field: endUserTechnicalData
        type: json
        description: "Body field 'endUserTechnicalData'"

extractRequestData:
  assign:
    authorRole: ${incoming.body.message.authorRole}
    authorTimestamp: ${incoming.body.message.authorTimestamp}
    content: ${incoming.body.message.content ?? ""}
    endUserId: ""
    endUserEmail: ""
    endUserPhone: ""
    endUserOs: ${incoming.body.endUserTechnicalData.endUserOs}
    endUserUrl: ${incoming.body.endUserTechnicalData.endUserUrl}
    forwardedByUser: ""
    forwardedFromCsa: ""
    forwardedToCsa: ""
    holidays: ${incoming.body.holidays}
    holidayNames: ${incoming.body.holidayNames}
  next: getChatUuid

getChatUuid:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/return_uuid"
    headers:
      type: json
  result: chat_uuid_result
  next: assignChatUuid

assignChatUuid:
  assign:
    chatUuid: ${chat_uuid_result.response.body.uuid}
  next: getMessageUuid

getMessageUuid:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/return_uuid"
    headers:
      type: json
  result: message_uuid_result
  next: assignMessageUuid

assignMessageUuid:
  assign:
    messageUuid: ${message_uuid_result.response.body.uuid}
  next: get_session_length

get_session_length:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "session_length"
  result: session_result
  next: generate_cookie

generate_cookie:
  call: http.post
  args:
    url: "[#CHATBOT_TIM]/jwt/custom-jwt-generate"
    body:
      JWTName: "chatJwt"
      expirationInMinutes: ${session_result.response.body[0]?.value ?? '120'}
      content: { "chatId": "${chatUuid}", "forwardTo": "" }
  result: cookie_result
  next: assign_cookie

assign_cookie:
  assign:
    setCookie:
      chatJwt: ${cookie_result.response.body.token}
      Domain: "[#DOMAIN]"
      Secure: true
      HttpOnly: true
      SameSite: "[#COOKIE_SAME_SITE]"
  next: get_is_bot_active

get_is_bot_active:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "is_bot_active"
  result: is_bot_active_result
  next: get_bot_institution_id

get_bot_institution_id:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "bot_institution_id"
  result: bot_institution_id_result
  next: insertChat

insertChat:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_chat_and_init"
    body:
      is_bot_active: ${is_bot_active_result.response.body[0]?.value}
      bot_institution_id: ${bot_institution_id_result.response.body[0]?.value}
      id: ${chatUuid}
      endUserId: ${endUserId}
      endUserFirstName: ""
      endUserLastName: ""
      status: "OPEN"
      lastMessage: ${content}
      created: "CURRENT_TIMESTAMP"
      ended: ""
      feedbackRating: ""
      feedbackText: ""
      endUserEmail: ${endUserEmail}
      endUserPhone: ${endUserPhone}
      endUserOs: ${endUserOs}
      endUserUrl: ${endUserUrl}
      externalId: ""
      forwardedTo: ""
      forwardedToName: ""
      receivedFrom: ""
      receivedFromName: ""
  result: insertChatResult
  next: postGreetingMessage

postGreetingMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RUUTER_PUBLIC]/chats/messages/greeting"
    body:
      chatId: ${chatUuid}
  result: greetingMessageResponse
  next: postClientMessage

postClientMessage:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/create_message"
    body:
      chatId: ${chatUuid}
      messageId: ${messageUuid}
      content: ${content}
      event: ""
      authorTimestamp: ${authorTimestamp}
      authorId: ${endUserId}
      authorFirstName: ""
      authorRole: ${authorRole}
      created: "CURRENT_TIMESTAMP"
      authorLastName: ""
      rating: ""
      forwardedByUser: ${forwardedByUser}
      forwardedFromCsa: ${forwardedFromCsa}
      forwardedToCsa: ${forwardedToCsa}
  result: insertMessageResult
  next: insertDenormalizedChat

insertDenormalizedChat:
  template: "[#CHATBOT_PROJECT_LAYER]/chats/create-denormalized-chat"
  requestType: templates
  body:
    chatId: ${chatUuid}
    endUserId: ${endUserId}
    endUserFirstName: ""
    endUserLastName: ""
    status: "OPEN"
    customerSupportId: ${insertChatResult.response.body[0].customerSupportId}
    customerSupportDisplayName: ${insertChatResult.response.body[0].customerSupportDisplayName}
    csaTitle: ${insertChatResult.response.body[0].csaTitle}
    created: ${insertChatResult.response.body[0].updated}
    updated: ${insertChatResult.response.body[0].updated}
    ended: ""
    feedbackRating: ""
    feedbackText: ""
    endUserEmail: ${endUserEmail}
    endUserPhone: ${endUserPhone}
    endUserOs: ${endUserOs}
    endUserUrl: ${endUserUrl}
    externalId: ""
    forwardedTo: ""
    forwardedToName: ""
    receivedFrom: ""
    receivedFromName: ""
    firstMessageTimestamp: ${greetingMessageResponse.response.body.response.updated}
    lastMessageTimestamp: ${insertMessageResult.response.body[0].updated}
    firstMessage: ${greetingMessageResponse.response.body.response.greetingMessage}
    lastMessage: ${content}
    lastMessageEvent: ""
    lastMessageIncludingEmptyContent: ${content}
    lastMessageEventWithContent: "greeting"
    lastNonEmptyMessageEvent: "greeting"
    allMessages: ${[greetingMessageResponse.response.body.response.greetingMessage , content]}
    customerMessagesCount: "${authorRole == 'end-user' ? 1 : 0}"
    firstSupportTimestamp: "${authorRole == 'backoffice-user' ? authorTimestamp : 'null'}"
    chatDurationInSeconds: "${authorRole == 'backoffice-user' ? 0 : 'null'}"
  result: denormalized-chat-result
  next: postMessageToBot

postMessageToBot:
  call: http.post
  args:
    url: "[#CHATBOT_RUUTER_PUBLIC]/internal/message-to-bot"
    body:
      chatId: ${chatUuid}
      content: ${content}
      holidays: ${holidays}
      holidayNames: ${holidayNames}
  result: message_to_bot_result
  next: check_for_post_message_to_bot_result

check_for_post_message_to_bot_result:
  switch:
    - condition: ${message_to_bot_result.response.body.response === 'Bot error'}
      next: return_bot_error
  next: getTitleVisibility

getTitleVisibility:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "is_csa_title_visible"
  result: title_res
  next: getChat

getChat:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_chat_by_id"
    query:
      id: ${chatUuid}
      is_csa_title_visible: ${title_res.response.body[0]?.value}
  result: chat_result
  next: notify_chats

notify_chats:
  template: "[#CHATBOT_PROJECT_LAYER]/chats/notify"
  requestType: templates
  body:
    chatId: ${chatUuid}
  result: chats_notify_res
  next: notify_messages

notify_messages:
  template: "[#CHATBOT_PROJECT_LAYER]/messages/notify"
  requestType: templates
  body:
    chatId: ${chatUuid}
    type: "message"
    messageId: ${messageUuid}
  result: messages_notify_res
  next: return_result

return_result:
  headers:
    Set-Cookie: ${setCookie}
  return: ${chat_result.response.body[0]}
  next: end

return_bot_error:
  status: 420
  return: "Bot error"
  next: end
