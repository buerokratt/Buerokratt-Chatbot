declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'RATING'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"
      - field: feedbackRating
        type: string
        description: "Body field 'feedbackRating'"

extractRequestData:
  assign:
    chatId: ${incoming.body.chatId}
    rating: ${incoming.body.feedbackRating}

check_rating_limit:
  switch:
    - condition: ${rating === null || rating === 'null'}
      next: return_invalid_rating
  next: addFeedbackRating

addFeedbackRating:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_chat_with_feedback_rating"
    body:
      id: ${chatId}
      feedback_rating: ${rating}
  result: res
  next: addDenormalizedChatFeedbackRating

addDenormalizedChatFeedbackRating:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_feedback_rating"
    body:
      chatId: ${chatId}
      feedback_rating: ${rating}
      updated: ${res.response.body[0].updated}
  result: denormalized_res
  next: updateDenormalizedChatMetricsChatFields

updateDenormalizedChatMetricsChatFields:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_messages_for_metrics_chat_fields_only"
    body:
      chatBaseId: ${chatId}
      chatId: ${res.response.body[0].id}
      status: "null"
      endUserEmail: "null"
      endUserPhone: "null"
      feedbackText: "null"
      feedbackRating: ${rating}
      customerSupportDisplayName: "null"
      customerSupportId: "null"
      customerSupportFirstName: "null"
      customerSupportLastName: "null"
      externalId: "null"
      receivedFrom: "null"
      updated: ${res.response.body[0].updated}
      ended: "null"
  result: updateDenormalizedChatMetricsRes
  next: return_result

return_result:
  return: "Rated Chat Successfully"
  next: end

return_invalid_rating:
  return: "error: invalid rating"
  next: end
