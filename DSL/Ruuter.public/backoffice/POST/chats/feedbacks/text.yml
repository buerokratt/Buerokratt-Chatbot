declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'TEXT'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"
      - field: feedbackText
        type: string
        description: "Body field 'feedbackText'"

extractRequestData:
  assign:
    chatId: ${incoming.body.chatId}
    text: ${incoming.body.feedbackText}

check_text_limit:
  switch:
    - condition: ${text === null || text === 'null'}
      next: return_invalid_text
  next: addFeedbackText

addFeedbackText:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_chat_with_feedback_text"
    body:
      id: ${chatId}
      feedbackText: ${text}
  result: res
  next: addDenormalizedChatFeedbackText

addDenormalizedChatFeedbackText:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_feedback_text"
    body:
      chatId: ${chatId}
      feedbackText: ${text}
      updated: ${res.response.body[0].updated}
  result: denormalized_res
  next: updateDenormalizedChatMetricsChatFields

updateDenormalizedChatMetricsChatFields:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/chat/update_denormalized_chat_messages_for_metrics_chat_fields_only"
    body:
      chatBaseId: ${chatId}
      chatId: ${res.response.body[0].id}
      status: "null"
      endUserEmail: "null"
      endUserPhone: "null"
      feedbackText: ${text}
      feedbackRating: "null"
      customerSupportDisplayName: "null"
      customerSupportId: "null"
      customerSupportFirstName: "null"
      customerSupportLastName: "null"
      externalId: "null"
      receivedFrom: "null"
      updated: ${res.response.body[0].updated}
      ended: "null"
  result: updateDenormalizedChatMetricsRes
  next: return_result

return_result:
  return: "Added Chat Feedback Successfully"
  next: end

return_invalid_text:
  return: "error: invalid feedback text"
  next: end
