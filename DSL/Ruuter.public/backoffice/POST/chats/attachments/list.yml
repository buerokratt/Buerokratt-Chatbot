declaration:
  call: declare
  version: 0.1
  description: "List all attachments for a chat"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    headers:
      - field: cookie
        type: string
        description: "Cookie field"

extractRequestData:
  assign:
    cookie: ${incoming.headers.cookie}
  next: get_chat_info

get_chat_info:
  call: http.post
  args:
    url: "[#CHATBOT_TIM]/jwt/custom-jwt-userinfo"
    contentType: plaintext
    headers:
      cookie: ${cookie}
    plaintext: "chatJwt"
  result: jwt_res
  next: check_chat_info_response

check_chat_info_response:
  switch:
    - condition: ${200 <= jwt_res.response.statusCodeValue && jwt_res.response.statusCodeValue < 300}
      next: assignChatId
  next: return_unauthorized

assignChatId:
  assign:
    chatId: ${jwt_res.response.body.chatId}
  next: get_attachments

get_attachments:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-attachments-by-chat-id"
    body:
      chatId: ${chatId}
  result: attachments_result
  next: return_success

return_success:
  status: 200
  return: ${attachments_result.response.body}
  next: end

return_unauthorized:
  status: 401
  return: "Unauthorized: Invalid or missing JWT"
  next: end
