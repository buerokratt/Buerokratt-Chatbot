declaration:
  call: declare
  version: 0.1
  description: "Decription placeholder for 'ESTIMATED-WAITING-TIME'"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: chatId
        type: string
        description: "Body field 'chatId'"

assignIncoming:
  assign:
    chatId: ${incoming.body.chatId}

getBotInstitutionId:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/config/get_configuration"
    query:
      key: "bot_institution_id"
  result: bot_res
  next: getDurationTotalInSeconds

getDurationTotalInSeconds:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_chats_ended_duration"
    query:
      bot_institution_id: "${bot_res.response.body[0].value}"
  result: durationTotalInSeconds

getUnassignedChats:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/get_chat_unassigned_with_position_count_by_chat_id"
    query:
      chatId: "${chatId ? chatId : ''}"
  result: unassignedChats

assignResponseVariables:
  assign:
    duration: ${durationTotalInSeconds.response.body[0].durationInSeconds}
    position: ${unassignedChats.response.body[0].positionInUnassignedChats}
    unassignedChats: ${unassignedChats.response.body[0].unassignedChatTotal}

calculateAverage:
  assign:
    average: ${duration / unassignedChats}

calculateDuration:
  assign:
    calculatedDuration: "${position > 0 ? average * position : duration}"

getEstimatedWaitingTime:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/reflect_waiting_time"
    headers:
      type: json
    body:
      durationInSeconds: ${calculatedDuration}
      positionInUnassignedChats: ${position}
  result: estimatedWaitingTime
  next: returnSuccess

returnSuccess:
  return: ${estimatedWaitingTime.response.body}
  next: end
