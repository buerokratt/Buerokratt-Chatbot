---
declaration:
  call: declare
  version: 0.1
  description: Description placeholder for 'SKM-BOT'
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    body:
      - field: message
        type: string
        description: Body field 'message'
      - field: sender
        type: string
        description: Body field 'sender'
      - field: domain
        type: string
        description: "Body field 'domain'"

extract_data:
  assign:
    currentDate: ${new Date().toISOString().split('T')[0]}
    sender: ${incoming.body.sender}
    domain: ${incoming.body.domain}
    stream: "[#SKM_STREAM]"
    use_agentic: "[#SKM_USE_AGENTIC]"
    agent_name: "[#AZURE_AGENT_NAME]"
    agent_type: "[#AZURE_AGENT_TYPE]"
    message: ${incoming.body.message ?? ''}

checkForDomain:
  switch:
    - condition: ${domain === 'none'}
      next: getSkmConfig
  next: getDomainUUID

getDomainUUID:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-uuid"
    body:
      domainUrl: ${domain + '%'}
  result: domainUuid
  next: validate_domain_res

validate_domain_res:
  switch:
    - condition: ${domainUuid.response.body.length > 0}
      next: getDomainSkmConfig
  next: getSkmConfig

getDomainSkmConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-skm-config"
    body:
      domainUUID: ${domainUuid.response.body[0].domainId}
  result: skm_res
  next: assignSkmConfig

getSkmConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-skm-config"
  result: skm_res
  next: assignSkmConfig

assignSkmConfig:
  assign:
    skm_config: ${skm_res.response.body[0]}

assign_data_sources:
  assign:
    data_sources:
      - type: azure_search
        parameters:
          endpoint: "[#SEARCH_ENDPOINT]"
          index_name: ${skm_config.indexName}
          semantic_configuration: ${skm_config.semanticConfiguration ?? 'azureml-default'}
          query_type: ${skm_config.queryType}
          in_scope: ${skm_config.inScope === 'true' ?? true}
          strictness: ${parseInt(skm_config.range ?? '3')}
          top_n_documents: ${parseInt(skm_config.documents ?? '5')}
          authentication:
            type: api_key
            key: "[#CHATBOT_EXTERNAL_KEY]"
          embedding_dependency:
            type: endpoint
            endpoint: "[#EMBEDDED_ENDPOINT_AZURE]"
            authentication:
              type: api_key
              key: "[#CHATBOT_EXTERNAL_API_KEY]"

get_chat_messages:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-llm-chat-messages"
    body:
      chatId: ${sender}
  result: chat_messages_res

prepare_messages:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/prepare-llm-messages"
    headers:
      type: json
    body:
      prompt_message: "${skm_config.systemMessage} The current date is ${currentDate}"
      messages: ${chat_messages_res.response.body}
      new_message: ${message}
  result: prepare_messages_res

assign_messages:
  assign:
    messages: ${prepare_messages_res.response.body}

check_if_anonymizer_is_active:
  switch:
    - condition: ${[#ANONYMIZER_ENABLED] === true}
      next: checkForPassedDomain
  next: trigger_ai_stream

checkForPassedDomain:
  switch:
    - condition: ${domain === 'none'}
      next: getAnonymizerConfig
  next: getDomainAnonymizerConfig

getAnonymizerConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-anonymizer-config"
  result: anonymizer_configs_res
  next: assignAnonymizerConfigs

getDomainAnonymizerConfig:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-domain-anonymizer-config"
    body:
      domainUUID: ${domain}
  result: anonymizer_configs_res
  next: assignAnonymizerConfigs

assignAnonymizerConfigs:
  assign:
    anonymizer_configs: ${anonymizer_configs_res.response.body[0]}
  next: check_if_anonymize_before_llm

check_if_anonymize_before_llm:
  switch:
    - condition: ${anonymizer_configs.isAnonymizationBeforeLlm === 'true'}
      next: prepareAnonymizerConfig
  next: trigger_ai_stream

prepareAnonymizerConfig:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/prepare_anonymizer_config"
    headers:
      type: json
    body:
      texts: ${messages.filter(i => i.role === 'user').map(i => i.content)}
      approach: ${anonymizer_configs.anonymizerSelectedApproach}
      entities: ${anonymizer_configs.anonymizerSelectedEntities.split(',')}
      allowlist: ${anonymizer_configs.anonymizerAllowlist.split(',')}
      denylist: ${anonymizer_configs.anonymizerDenylist.split(',')}
      hash_type: "[#ANONYMIZER_HASH_TYPE]"
  result: preparedAnonymizerConfigs
  next: assignPreparedAnonymizerConfigs

assignPreparedAnonymizerConfigs:
  assign:
    preparedAnonymizerConfigs: ${preparedAnonymizerConfigs.response.body}
  next: anonymizeText

anonymizeText:
  call: http.post
  args:
    url: "[#CHATBOT_ANONYMIZER]/anonymize"
    body:
      texts: ${preparedAnonymizerConfigs.texts}
      anonymizers: ${preparedAnonymizerConfigs.anonymizers}
      entities: ${preparedAnonymizerConfigs.entities}
      allowlist: ${preparedAnonymizerConfigs.allowlist}
      denylist: ${preparedAnonymizerConfigs.denylist}
  result: anonymize_res
  next: assign_anonymized_messages

assign_anonymized_messages:
  assign:
    anonymizedMessages: ${anonymize_res.response.body.results}
    messages: "$=messages.map((m, i) => m.role === 'user' ? {...m, content: anonymizedMessages[messages.slice(0, i).filter(msg => msg.role === 'user').length].text} : m)="

trigger_ai_stream:
  call: http.post
  args:
    url: "[#CHATBOT_NOTIFICATIONS]/channels/${sender}/stream"
    headers:
      Content-Type: application/json
      api-key: "[#CHATBOT_EXTERNAL_API_KEY]"
    body:
      use_agentic: ${use_agentic.toLowerCase() === 'true'}
      agent_name: ${agent_name}
      agent_type: ${agent_type}
      messages: ${messages}
      options:
        data_sources: ${data_sources}
        max_tokens: ${parseInt(skm_config.maxTokens ?? '1000')}
        temperature: 0
        top_p: 1
        stream: ${stream.toLowerCase() === 'true'}
        frequency_penalty: 0
        presence_penalty: 0
  result: stream_response

return_result:
  return: "stream triggered"
  next: end
