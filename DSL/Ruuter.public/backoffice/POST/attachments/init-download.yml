declaration:
  call: declare
  version: 0.1
  description: "Initialize attachment download - verify JWT and generate signed URL"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    headers:
      - field: cookie
        type: string
        description: "Cookie field for JWT"
    body:
      - field: attachmentId
        type: string
        description: "Attachment base ID"

extractRequestData:
  assign:
    attachmentId: ${incoming.body.attachmentId}
    cookie: ${incoming.headers.cookie}
  next: validateInput

validateInput:
  switch:
    - condition: ${!attachmentId}
      next: returnBadRequest
    - condition: ${cookie == null || cookie == ""}
      next: returnUnauthorized
  next: getChatInfo

getChatInfo:
  call: http.post
  args:
    url: "[#CHATBOT_TIM]/jwt/custom-jwt-userinfo"
    contentType: plaintext
    headers:
      cookie: ${cookie}
    plaintext: "chatJwt"
  result: infoRes
  next: checkChatInfoResponse

checkChatInfoResponse:
  switch:
    - condition: ${200 <= infoRes.response.statusCodeValue && infoRes.response.statusCodeValue < 300}
      next: assignChatId
  next: returnUnauthorized

assignChatId:
  assign:
    chatId: ${infoRes.response.body.chatId}
  next: logAuthSuccess

logAuthSuccess:
  log: $= "[POC-ATTACHMENTS] User authenticated for download - chat " + chatId =
  next: getAttachment

getAttachment:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get_attachment_by_id"
    body:
      baseId: ${attachmentId}
  result: attachmentResult
  next: logAttachmentResult

logAttachmentResult:
  log: ${attachmentResult}
  next: validateAttachment

validateAttachment:
  switch:
    - condition: ${attachmentResult.response.body.length === 0}
      next: returnAttachmentNotFound
  assign:
    attachmentChatId: ${attachmentResult.response.body[0].chatBaseId}
    storagePath: ${attachmentResult.response.body[0].storagePath}
    fileName: ${attachmentResult.response.body[0].fileName}
  next: logChatComparison

logChatComparison:
  log: $= "[POC-ATTACHMENTS] Comparing - attachmentChatId " + attachmentChatId + " vs chatId " + chatId =
  next: validateChatMembership

validateChatMembership:
  switch:
    - condition: ${attachmentChatId !== chatId}
      next: returnForbidden
  next: logAccessGranted

logAccessGranted:
  log: $= "[POC-ATTACHMENTS] Access granted for attachment " + attachmentId =
  next: requestSignedUrl

requestSignedUrl:
  call: http.post
  args:
    url: "[#CHATBOT_STORAGE_FERRY]/v1/files/signed-url/download"
    body:
      fileName: ${storagePath}
      bucket: "quarantine"
  result: signedUrlResult
  next: logSignedUrlSuccess

logSignedUrlSuccess:
  log: $= "[POC-ATTACHMENTS] Download signed URL generated for " + fileName =
  next: returnSuccess

returnSuccess:
  status: 200
  return: "$=({attachmentId: attachmentId, signedUrl: signedUrlResult.response.body.url, fileName: fileName})="
  next: end

returnBadRequest:
  status: 400
  return: "Error: Invalid request"
  next: end

returnUnauthorized:
  status: 401
  return: "Error: Unauthorized"
  next: end

returnAttachmentNotFound:
  status: 404
  return: "Error: Attachment not found"
  next: end

returnForbidden:
  status: 403
  return: "Error: Forbidden - attachment not in your chat"
  next: end
