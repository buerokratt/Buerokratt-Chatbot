declaration:
  call: declare
  version: 0.1
  description: "Initialize attachment upload - returns signed URL for direct upload"
  method: post
  accepts: json
  returns: json
  namespace: backoffice
  allowlist:
    headers:
      - field: cookie
        type: string
        description: "Cookie field"
    body:
      - field: fileName
        type: string
        description: "Name of the file"
      - field: fileSize
        type: number
        description: "Size of the file in bytes"
      - field: mimeType
        type: string
        description: "MIME type of the file"
      - field: messageId
        type: string
        description: "Optional message ID to attach file to"

extractRequestData:
  assign:
    fileName: ${incoming.body.fileName}
    fileSize: ${incoming.body.fileSize}
    mimeType: ${incoming.body.mimeType}
    messageId: ${incoming.body.messageId ?? null}
    cookie: ${incoming.headers.cookie}
  next: validateInput

validateInput:
  switch:
    - condition: ${!fileName || !fileSize || !mimeType}
      next: returnBadRequest
    - condition: ${fileSize <= 0 || fileSize > 10485760}
      next: returnFileSizeExceeded
    - condition: ${cookie == null || cookie == ""}
      next: returnUnauthorized
  next: getChatInfo

getChatInfo:
  call: http.post
  args:
    url: "[#CHATBOT_TIM]/jwt/custom-jwt-userinfo"
    contentType: plaintext
    headers:
      cookie: ${cookie}
    plaintext: "chatJwt"
  result: infoRes
  next: checkChatInfoResponse

checkChatInfoResponse:
  switch:
    - condition: ${200 <= infoRes.response.statusCodeValue && infoRes.response.statusCodeValue < 300}
      next: assignChatId
  next: returnUnauthorized

assignChatId:
  assign:
    chatId: ${infoRes.response.body.chatId}
  next: logAuthSuccess

logAuthSuccess:
  log: $= "[POC-ATTACHMENTS] User authenticated - chat " + chatId =
  next: getAttachmentUuid

getAttachmentUuid:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/return_uuid"
    headers:
      type: json
  result: uuid_result
  next: assignUuid

assignUuid:
  assign:
    attachmentId: ${uuid_result.response.body.uuid}
  next: getActiveChatById

getActiveChatById:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/get-active-chat-by-id"
    body:
      id: ${chatId}
  result: activeChatRes
  next: checkActiveChatResult

checkActiveChatResult:
  switch:
    - condition: ${activeChatRes.response.body.length > 0}
      next: generateStoragePath
  next: returnChatEnded

generateStoragePath:
  assign:
    storagePath: $= "attachments/" + attachmentId + "/" + fileName =
  next: insertAttachment

insertAttachment:
  call: http.post
  args:
    url: "[#CHATBOT_RESQL]/insert_attachment"
    body:
      baseId: ${attachmentId}
      chatBaseId: ${chatId}
      messageBaseId: ""
      fileName: ${fileName}
      fileSize: ${fileSize}
      mimeType: ${mimeType}
      storagePath: ${storagePath}
      uploadedBy: ""
      uploadedByRole: "end_user"
  result: insertResult
  next: logAttachmentCreated

logAttachmentCreated:
  log: $= "[POC-ATTACHMENTS] Attachment record created - " + attachmentId + " - " + fileName =
  next: requestSignedUrl

requestSignedUrl:
  call: http.post
  args:
    url: "[#CHATBOT_STORAGE_FERRY]/v1/files/signed-url/upload"
    body:
      fileName: ${storagePath}
      fileSize: ${fileSize}
      mimeType: ${mimeType}
  result: signedUrlResult
  next: checkSignedUrlResult

checkSignedUrlResult:
  switch:
    - condition: ${200 <= signedUrlResult.response.statusCodeValue && signedUrlResult.response.statusCodeValue < 300}
      next: logSignedUrlSuccess
  next: returnStorageError

logSignedUrlSuccess:
  log: $= "[POC-ATTACHMENTS] Signed URL generated for " + attachmentId =
  next: returnSuccess

returnSuccess:
  status: 200
  return: "$=({attachmentId: attachmentId, signedUrl: signedUrlResult.response.body.url, storagePath: storagePath})="
  next: end

returnUnauthorized:
  status: 401
  return: "Error: Unauthorized"
  next: end

returnChatEnded:
  status: 400
  return: "Error: Chat has ended"
  next: end

returnBadRequest:
  status: 400
  return: "Error: Invalid request"
  next: end

returnFileSizeExceeded:
  status: 400
  return: "Error: File size exceeds maximum allowed size of 10MB"
  next: end

returnStorageError:
  status: 500
  return: "Error: Failed to generate upload URL"
  next: end
