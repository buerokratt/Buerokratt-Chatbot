get_users_having_active_status:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/auth_users/list_users_having_status_active"
  result: activeUsers

getChatMessages:
  call: http.get
  args:
    url: "[#CHATBOT_RESQL]/chat/list_chat_messages"
    query:
      chatId: ${incoming.body.chatId}
  result: res

enrich_messages_with_csa_titles:
  call: http.post
  args:
    url: "[#CHATBOT_DMAPPER_HBS]/enrich_chats_with_author_data"
    headers:
      type: json
    body:
      chatMessagesRes: ${res.response.body}
      activeUsers: ${activeUsers.response.body}
  result: res

return_result:
  return: ${res.response.body}
  next: end
