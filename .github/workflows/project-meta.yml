name: Update Project Meta

on:
  workflow_dispatch:

jobs:
  update-meta:
    runs-on: ubuntu-latest

    steps:
      - name: Run update for Buerokratt-Chatbot items
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwDOBXrl9M4AToqt"; // Bürokratt Sprint
            const targetRepo = "Buerokratt-Chatbot";

            // Field IDs
            const fieldCreatedBy = "PVTF_lADOBXrl9M4AToqtzhAIhu4"; // Created By (TEXT)
            const fieldCreatedDate = "PVTF_lADOBXrl9M4AToqtzhAIh1w"; // Created Date (DATE)
            const fieldLastUpdated = "PVTF_lADOBXrl9M4AToqtzhAIh_o"; // Last Updated (DATE)
            const fieldLastModifiedBy = "PVTF_lADOBXrl9M4AToqtzhAIiE4"; // Last Modified By (TEXT)

            console.log(`Manual refresh — updating ONLY ${targetRepo} items`);

            // -------------------------
            // Get all project items
            // -------------------------
            async function getAllProjectItems() {
              let items = [];
              let cursor = null;
              let hasNextPage = true;

              while (hasNextPage) {
                const result = await github.graphql(`
                  query($projectId: ID!, $cursor: String) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100, after: $cursor) {
                          nodes {
                            id
                            content {
                              ... on Issue {
                                number
                                repository { name }
                                author { login }
                                createdAt
                              }
                              ... on PullRequest {
                                number
                                repository { name }
                                author { login }
                                createdAt
                              }
                            }
                          }
                          pageInfo { endCursor hasNextPage }
                        }
                      }
                    }
                  }
                `, { projectId, cursor });

                const page = result.node.items;
                items = items.concat(page.nodes);
                cursor = page.pageInfo.endCursor;
                hasNextPage = page.pageInfo.hasNextPage;
              }

              return items;
            }

            const allItems = await getAllProjectItems();
            console.log(`Total items in project: ${allItems.length}`);

            // -------------------------
            // Helper to update a field
            // -------------------------
            async function updateField(itemId, fieldId, value, type) {
              const mutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: $value
                  }) {
                    projectV2Item { id }
                  }
                }
              `;

              const graphqlValue = type === "text" ? { text: value } : { date: value };

              try {
                await github.graphql(mutation, {
                  projectId,
                  itemId,
                  fieldId,
                  value: graphqlValue
                });
              } catch (err) {
                console.log(`❌ Failed to update field ${fieldId} on item ${itemId}: ${err.message}`);
              }
            }

            // -------------------------
            // Update only targetRepo items
            // -------------------------
            for (const item of allItems) {
              const content = item.content;
              if (!content || !content.repository) continue;

              if (content.repository.name !== targetRepo) {
                console.log(`Skipping #${content.number} (repo=${content.repository.name})`);
                continue;
              }

              console.log(`Updating item #${content.number}`);

              const author = content.author?.login ?? "unknown";
              const createdAt = content.createdAt;
              const updatedAt = new Date().toISOString();

              await updateField(item.id, fieldCreatedBy, author, "text");
              await updateField(item.id, fieldCreatedDate, createdAt, "date");
              await updateField(item.id, fieldLastUpdated, updatedAt, "date");
              await updateField(item.id, fieldLastModifiedBy, author, "text");
            }

            console.log("Done updating all Buerokratt-Chatbot items.");
