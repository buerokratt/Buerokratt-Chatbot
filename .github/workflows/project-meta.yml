name: Update Project Meta

on:
  workflow_dispatch:

jobs:
  update-meta:
    runs-on: ubuntu-latest

    steps:
      - name: Run update
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwDOBXrl9M4AToqt"; // Bürokratt Sprint

            // Field IDs
            const createdByFieldId = "PVTF_lADOBXrl9M4AToqtzhAIhu4"; // Created by
            const createdDateFieldId = "PVTF_lADOBXrl9M4AToqtzhAIh1w"; // Created date
            const lastUpdatedFieldId = "PVTF_lADOBXrl9M4AToqtzhAIh_o"; // Last updated
            const lastModifiedByFieldId = "PVTF_lADOBXrl9M4AToqtzhAIiE4"; // Last modified by

            console.log("Manual refresh — updating ALL project items");

            // 1. Get project items
            const query = `
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 500) {
                      nodes {
                        id
                        type
                        content {
                          ... on Issue {
                            number
                            repository { name }
                            createdAt
                            updatedAt
                            author { login }
                            editor { login }
                            comments(last: 1) {
                              nodes {
                                author { login }
                                createdAt
                              }
                            }
                          }
                          ... on PullRequest {
                            number
                            repository { name }
                            createdAt
                            updatedAt
                            author { login }
                            editor { login }
                            comments(last: 1) {
                              nodes {
                                author { login }
                                createdAt
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, { projectId });
            const items = result.node.items.nodes;

            console.log(`Total items in project: ${items.length}`);

            for (const item of items) {
              const content = item.content;
              if (!content || !content.repository) continue;

              // Compute actual last modified info
              const lastComment = content.comments?.nodes[0];
              const lastModifiedBy = lastComment?.author?.login ?? content.editor?.login ?? content.author?.login;
              const lastUpdated = lastComment?.createdAt ?? content.updatedAt;

              try {
                // Update Created by
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $text: String!) {
                    updateProjectV2ItemFieldValue(
                      input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { text: $text } }
                    ) { projectV2Item { id } }
                  }
                `, { projectId, itemId: item.id, fieldId: createdByFieldId, text: content.author?.login });

                // Update Created date
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: DateTime!) {
                    updateProjectV2ItemFieldValue(
                      input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { date: $date } }
                    ) { projectV2Item { id } }
                  }
                `, { projectId, itemId: item.id, fieldId: createdDateFieldId, date: content.createdAt });

                // Update Last modified by
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $text: String!) {
                    updateProjectV2ItemFieldValue(
                      input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { text: $text } }
                    ) { projectV2Item { id } }
                  }
                `, { projectId, itemId: item.id, fieldId: lastModifiedByFieldId, text: lastModifiedBy });

                // Update Last updated
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: DateTime!) {
                    updateProjectV2ItemFieldValue(
                      input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { date: $date } }
                    ) { projectV2Item { id } }
                  }
                `, { projectId, itemId: item.id, fieldId: lastUpdatedFieldId, date: lastUpdated });

                console.log(`✅ Updated item #${content.number} (${content.repository.name})`);

              } catch (err) {
                console.log(`❌ Failed to update #${content.number}: ${err.message}`);
              }
            }

            console.log("Done.");
