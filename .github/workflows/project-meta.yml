name: Update Project Meta

on:
  workflow_dispatch:

jobs:
  update-meta:
    runs-on: ubuntu-latest

    steps:
      - name: Run update
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwDOBXrl9M4AToqt"; // Bürokratt Sprint

            // Field IDs
            const fields = {
              createdBy: "PVTF_lADOBXrl9M4AToqtzhAIhu4",  // Created by (TEXT)
              createdDate: "PVTF_lADOBXrl9M4AToqtzhAIh_o", // Created date (DATE)
              lastUpdated: "PVTF_lADOBXrl9M4AToqtzhAIiE4", // Last updated (DATE)
              lastModifiedBy: "PVTF_lADOBXrl9M4AToqtzhAIh1w" // Last modified by (TEXT)
            };

            console.log("Manual refresh — updating ALL project items");

            let hasNextPage = true;
            let endCursor = null;
            let totalItems = 0;

            while (hasNextPage) {
              // 1. Fetch project items with pagination (max 100)
              const query = `
                query($projectId: ID!, $after: String) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100, after: $after) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          id
                          type
                          content {
                            ... on Issue {
                              number
                              repository { name }
                              createdAt
                              updatedAt
                              author { login }
                              editor { login }
                              comments(last: 1) {
                                nodes {
                                  author { login }
                                  createdAt
                                }
                              }
                            }
                            ... on PullRequest {
                              number
                              repository { name }
                              createdAt
                              updatedAt
                              author { login }
                              editor { login }
                              comments(last: 1) {
                                nodes {
                                  author { login }
                                  createdAt
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              const result = await github.graphql(query, { projectId, after: endCursor });

              const itemsData = result.node.items;
              hasNextPage = itemsData.pageInfo.hasNextPage;
              endCursor = itemsData.pageInfo.endCursor;
              const items = itemsData.nodes;

              totalItems += items.length;

              for (const item of items) {
                const content = item.content;
                if (!content) continue;

                // Determine values
                const createdBy = content.author?.login || "unknown";
                const createdDate = content.createdAt || null;

                // Last modified by / last updated = last comment if exists, else editor/updatedAt
                const lastComment = content.comments?.nodes[0];
                const lastModifiedBy = lastComment?.author?.login || content.editor?.login || createdBy;
                const lastUpdated = lastComment?.createdAt || content.updatedAt || createdDate;

                const updates = [
                  { fieldId: fields.createdBy, value: { text: createdBy } },
                  { fieldId: fields.createdDate, value: { date: createdDate } },
                  { fieldId: fields.lastModifiedBy, value: { text: lastModifiedBy } },
                  { fieldId: fields.lastUpdated, value: { date: lastUpdated } },
                ];

                for (const u of updates) {
                  try {
                    await github.graphql(`
                      mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValueInput!) {
                        updateProjectV2ItemFieldValue(input: {
                          projectId: $projectId,
                          itemId: $itemId,
                          fieldId: $fieldId,
                          value: $value
                        }) {
                          projectV2Item { id }
                        }
                      }
                    `, {
                      projectId,
                      itemId: item.id,
                      fieldId: u.fieldId,
                      value: u.value
                    });
                  } catch (err) {
                    console.log(`❌ Failed to update #${content.number} field ${u.fieldId}: ${err.message}`);
                  }
                }
              }
            }

            console.log(`✅ Finished updating ${totalItems} items.`);
