name: Update Project Metadata — Event

on:
  issues:
    types: [opened, edited, reopened, closed]
  pull_request:
    types: [opened, edited, reopened, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  update-item:
    runs-on: ubuntu-latest
    steps:
      - name: Update Project Metadata
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwDOBXrl9M4AToqt"; // Bürokratt Sprint
            const fieldCreatedBy = "PVTF_lADOBXrl9M4AToqtzhAIhu4";
            const fieldCreatedDate = "PVTF_lADOBXrl9M4AToqtzhAIh1w";
            const fieldLastModifiedBy = "PVTF_lADOBXrl9M4AToqtzhAIiE4";
            const fieldLastUpdated = "PVTF_lADOBXrl9M4AToqtzhAIh_o";

            const item = context.payload.issue ?? context.payload.pull_request;
            if (!item) {
              console.log("No issue or PR found in payload. Skipping.");
              return;
            }

            const itemId = await (async () => {
              const items = await github.graphql(`
                query($cursor: String) {
                  node(id: "${projectId}") {
                    ... on ProjectV2 {
                      items(first: 100, after: $cursor) {
                        nodes {
                          id
                          content { id }
                        }
                        pageInfo { endCursor hasNextPage }
                      }
                    }
                  }
                }
              `);
              const found = items.node.items.nodes.find(i => i.content?.id === item.node_id);
              return found?.id;
            })();

            if (!itemId) {
              console.log("Item not in project. Skipping.");
              return;
            }

            const updatedAt = new Date().toISOString();
            const lastModifiedBy = context.payload.sender.login;
            const createdBy = item.user.login;
            const createdAt = item.created_at;

            // LastModified
            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${projectId}",
                  itemId: "${itemId}",
                  fieldId: "${fieldLastModifiedBy}",
                  value: { text: "${lastModifiedBy}" }
                }) { projectV2Item { id } }
              }
            `);

            // LastUpdated
            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${projectId}",
                  itemId: "${itemId}",
                  fieldId: "${fieldLastUpdated}",
                  value: { date: "${updatedAt}" }
                }) { projectV2Item { id } }
              }
            `);

            if (context.payload.action === "opened") {
              // CreatedBy
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}",
                    itemId: "${itemId}",
                    fieldId: "${fieldCreatedBy}",
                    value: { text: "${createdBy}" }
                  }) { projectV2Item { id } }
                }
              `);
              // CreatedDate
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${projectId}",
                    itemId: "${itemId}",
                    fieldId: "${fieldCreatedDate}",
                    value: { date: "${createdAt}" }
                  }) { projectV2Item { id } }
                }
              `);
            }

            console.log("Update complete.");
