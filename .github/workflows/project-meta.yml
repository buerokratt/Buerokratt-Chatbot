name: Update Project Meta

on:
  workflow_dispatch:

jobs:
  update-meta:
    runs-on: ubuntu-latest

    steps:
      - name: Run update
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          script: |
            const targetRepo = "Buerokratt-Chatbot";
            const projectId = "PVT_kwDOBXrl9M4AToqt"; // Bürokratt Sprint
            const fieldId = "PVTF_lADOBXrl9M4AToqtzhAIhu4"; // Created by (TEXT)
            const newValue = "turnerrainer";

            console.log(`Updating ONLY issues from repo: ${targetRepo}`);

            // 1. Get project items
            const query = `
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 200) {
                      nodes {
                        id
                        type
                        content {
                          ... on Issue {
                            number
                            repository { name }
                          }
                          ... on PullRequest {
                            number
                            repository { name }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, { projectId });

            const items = result.node.items.nodes;

            for (const item of items) {
              const content = item.content;
              if (!content || !content.repository) continue;

              const repoName = content.repository.name;

              if (repoName !== targetRepo) {
                console.log(`Skipping ${content.number} (repo=${repoName})`);
                continue;
              }

              console.log(`Updating item #${content.number}`);

              const mutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $text: String!) {
                  updateProjectV2ItemFieldValue(
                    input: {
                      projectId: $projectId,
                      itemId: $itemId,
                      fieldId: $fieldId,
                      value: { text: $text }
                    }
                  ) {
                    projectV2Item { id }
                  }
                }
              `;

              try {
                await github.graphql(mutation, {
                  projectId,
                  itemId: item.id,
                  fieldId,
                  text: newValue
                });
              } catch (err) {
                console.log(`❌ Failed for #${content.number}: ${err.message}`);
              }
            }

            console.log("Done.");
