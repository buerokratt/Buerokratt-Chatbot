name: Update Project Metadata

on:
  workflow_dispatch:   # ← This enables the "Run workflow" button
  issues:
    types: [opened, edited, reopened, closed]
  pull_request:
    types: [opened, edited, reopened, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  update-project-fields:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -------------------------
      # DEBUG — List all project fields
      # -------------------------
      - name: DEBUG — List all project fields
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwDOBXrl9M4AToqt"; // replace with your project ID

            const fields = await github.graphql(`
              query {
                node(id: "${projectId}") {
                  ... on ProjectV2 {
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2FieldCommon {
                          id
                          name
                          dataType
                        }
                        ... on ProjectV2IterationField {
                          id
                          name
                          dataType
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          dataType
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `);

            console.log("PROJECT FIELDS:");
            for (const f of fields.node.fields.nodes) {
              console.log(`${f.name} | ${f.dataType} | ${f.id}`);
            }

